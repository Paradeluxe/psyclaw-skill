    <script src="json2psyexp.js"></script>
    <script>
        console.log('Script starting');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 预加载图标
        const tapIcon = new Image();
        tapIcon.src = 'icon/tap.svg';
        let tapIconLoaded = false;
        tapIcon.onload = () => {
            tapIconLoaded = true;
        };

        const dpr = window.devicePixelRatio || 1;
        const baseHeight = 600;
        const baseStartX = 60;
        const baseEndX = 1060;
        const maxPoints = 9;
        const spacing = (baseEndX - baseStartX) / (maxPoints - 1);
        const minDisplayRoutines = 1;

        const chatbotPanel = document.getElementById('chatbotPanel');
        const chatbotResizer = document.getElementById('chatbotResizer');
        const chatbotFrame = document.getElementById('chatbotFrame');
        const routineControls = document.querySelector('.routine-controls');
        let isResizingChatbot = false;
        let startX = 0;
        let startWidth = 0;

        chatbotResizer.addEventListener('mousedown', (e) => {
            isResizingChatbot = true;
            startX = e.clientX;
            startWidth = chatbotPanel.offsetWidth;
            document.body.style.cursor = 'ew-resize';
            document.body.style.userSelect = 'none';
            // Disable pointer events on iframe to prevent it from capturing mouse events
            chatbotFrame.style.pointerEvents = 'none';
            e.stopPropagation();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizingChatbot) return;
            
            const delta = startX - e.clientX;
            const containerWidth = window.innerWidth;
            const newWidth = startWidth + delta;
            
            const minWidth = containerWidth * 0.2;
            const maxWidth = containerWidth * 0.5;
            
            const clampedWidth = Math.max(minWidth, Math.min(maxWidth, newWidth));
            chatbotPanel.style.width = (clampedWidth / containerWidth * 100) + '%';
            
            // Update body padding to match chatbot panel width
            document.body.style.paddingRight = (clampedWidth + 20) + 'px';
        });

        document.addEventListener('mouseup', () => {
            isResizingChatbot = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            // Re-enable pointer events on iframe
            chatbotFrame.style.pointerEvents = 'auto';
            
            // Persist the padding change
            const currentPadding = document.body.style.paddingRight;
            if (currentPadding) {
                document.body.style.paddingRight = currentPadding;
            }
        });

        // Initial padding setup
        const initialChatbotWidth = chatbotPanel.offsetWidth;
        document.body.style.paddingRight = (initialChatbotWidth + 20) + 'px';

        let isCanvasPanning = false;
        let canvasPanStartX = 0;
        let canvasPanStartY = 0;
        let canvasPanStartViewportX = 0;
        let canvasPanStartViewportY = 0;

        document.addEventListener('click', (e) => {
            if (!chatbotPanel.contains(e.target)) {
                chatbotFrame.contentWindow.postMessage('closeAdvancedSettings', '*');
            }
        });
         
        function calculateCanvasWidth(routineCount) {
            const displayCount = Math.max(routineCount, minDisplayRoutines);
            const totalPoints = displayCount * 2 + 1;
            const contentWidth = baseStartX + (totalPoints - 1) * spacing + 80;
            return Math.max(800, contentWidth);
        }

        function getFlowchartCenter() {
            if (routineRects.length === 0) {
                // 如果没有 routine，返回初始 flowchart 的中心点
                // 初始 flowchart 有 3 个点（minDisplayRoutines=1），中心在第二个点
                return { x: baseStartX + spacing, y: lineY };
            }
            
            // 如果有选中的 routine，以选中的 routine 为中心
            if (selectedRoutineIndex >= 0 && selectedRoutineIndex < routineRects.length) {
                const selectedRect = routineRects[selectedRoutineIndex];
                return {
                    x: selectedRect.x + selectedRect.width / 2,
                    y: selectedRect.y + selectedRect.height / 2
                };
            }
            
            // 如果没有选中的 routine，以第一个 routine 为中心
            const firstRect = routineRects[0];
            return {
                x: firstRect.x + firstRect.width / 2,
                y: firstRect.y + firstRect.height / 2
            };
        }
        
        // 显示通知消息
        function showNotification(message, duration = 3000) {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #4CAF50;
                color: white;
                padding: 12px 24px;
                border-radius: 4px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // 自动消失
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, duration);
        }
        
        let currentRoutineCount = 0;
        let canvasWidth = calculateCanvasWidth(currentRoutineCount);

        let viewportX = 0;
        let viewportY = 0;
        let scale = 1;
        const minScale = 0.25;
        const maxScale = 3;
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;
        let lastPanX = 0;
        let lastPanY = 0;
        let panStartViewportX = 0;
        let panStartViewportY = 0;

        const backwardButton = document.getElementById('backwardButton');
        const forwardButton = document.getElementById('forwardButton');
        const zoomInButton = document.getElementById('zoomIn');
        const zoomOutButton = document.getElementById('zoomOut');
        const resetViewButton = document.getElementById('resetView');
        const zoomLevelDisplay = document.getElementById('zoomLevel');
        const maxHistoryLength = 15;
        const historyStack = [];
        const redoStack = [];

        function updateZoomLevelDisplay() {
            zoomLevelDisplay.textContent = Math.round(scale * 100) + '%';
        }

        function zoomIn() {
            // 计算排除 chatbot 后的画布中心
            const chatbotWidth = chatbotPanel.offsetWidth;
            const canvasCenterX = (window.innerWidth - chatbotWidth) / 2;
            const canvasCenterY = window.innerHeight / 2;
            
            const newScale = Math.min(maxScale, scale * 1.2);
            
            // 获取 flowchart 内容的中心点
            const flowchartCenter = getFlowchartCenter();
            
            // 将 flowchart 中心点置于画布中心（排除 chatbot）
            viewportX = canvasCenterX / newScale - flowchartCenter.x;
            viewportY = canvasCenterY / newScale - flowchartCenter.y;
            scale = newScale;

            draw();
            updateZoomLevelDisplay();
        }

        function zoomOut() {
            // 计算排除 chatbot 后的画布中心
            const chatbotWidth = chatbotPanel.offsetWidth;
            const canvasCenterX = (window.innerWidth - chatbotWidth) / 2;
            const canvasCenterY = window.innerHeight / 2;
            
            const newScale = Math.max(minScale, scale * 0.8);
            
            // 获取 flowchart 内容的中心点
            const flowchartCenter = getFlowchartCenter();
            
            // 将 flowchart 中心点置于画布中心（排除 chatbot）
            viewportX = canvasCenterX / newScale - flowchartCenter.x;
            viewportY = canvasCenterY / newScale - flowchartCenter.y;
            scale = newScale;

            draw();
            updateZoomLevelDisplay();
        }

        function resetView() {
            viewportX = 0;
            viewportY = 0;
            scale = 1;
            draw();
            updateZoomLevelDisplay();
        }

        zoomInButton.addEventListener('click', zoomIn);
        zoomOutButton.addEventListener('click', zoomOut);
        resetViewButton.addEventListener('click', resetView);

        function deepCopyState(state) {
            return JSON.parse(JSON.stringify(state));
        }

        function saveState() {
            const state = {
                routineRects: deepCopyState(routineRects),
                connections: deepCopyState(connections),
                selectedRoutineIndex: selectedRoutineIndex,
                currentRoutineCount: currentRoutineCount
            };
            historyStack.push(state);
            redoStack.length = 0;
            if (historyStack.length > maxHistoryLength) {
                historyStack.shift();
            }
            updateUndoButtons();
        }

        function undo() {
            if (historyStack.length === 0) return;
            
            const state = historyStack.pop();
            redoStack.push({
                routineRects: deepCopyState(routineRects),
                connections: deepCopyState(connections),
                selectedRoutineIndex: selectedRoutineIndex,
                currentRoutineCount: currentRoutineCount
            });
            
            routineRects.length = 0;
            routineRects.push(...deepCopyState(state.routineRects));
            connections.length = 0;
            connections.push(...deepCopyState(state.connections));
            selectedRoutineIndex = state.selectedRoutineIndex;
            currentRoutineCount = state.currentRoutineCount;
            
            updatePoints();
            updateRoutineCount();
            draw();
            updateUndoButtons();
        }

        function redo() {
            if (redoStack.length === 0) return;
            
            const state = redoStack.pop();
            historyStack.push({
                routineRects: deepCopyState(routineRects),
                connections: deepCopyState(connections),
                selectedRoutineIndex: selectedRoutineIndex,
                currentRoutineCount: currentRoutineCount
            });
            
            routineRects.length = 0;
            routineRects.push(...deepCopyState(state.routineRects));
            connections.length = 0;
            connections.push(...deepCopyState(state.connections));
            selectedRoutineIndex = state.selectedRoutineIndex;
            currentRoutineCount = state.currentRoutineCount;
            
            updatePoints();
            updateRoutineCount();
            draw();
            updateUndoButtons();
        }

        function updateUndoButtons() {
            backwardButton.disabled = historyStack.length === 0;
            forwardButton.disabled = redoStack.length === 0;
        }

        backwardButton.addEventListener('click', undo);
        forwardButton.addEventListener('click', redo);

        canvas.width = window.innerWidth * dpr;
        canvas.height = window.innerHeight * dpr;
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            draw();
        });

        const lineY = 300;

        function generatePoints(routineCount) {
            const totalPoints = routineCount * 2 + 1;
            const startX = baseStartX;
            const endX = baseStartX + (totalPoints - 1) * spacing;
            const points = [];
            
            for (let i = 0; i < totalPoints; i++) {
                const label = i + 1;
                points.push({
                    x: startX + i * spacing,
                    y: lineY,
                    label: label.toString(),
                    isSnapTarget: label % 2 === 0
                });
            }
            
            return {
                all: points,
                snap: points.filter(p => p.isSnapTarget),
                line: points.filter(p => !p.isSnapTarget),
                startX: startX,
                endX: endX
            };
        }

        let pointsData = generatePoints(minDisplayRoutines);
        let snapPoints = pointsData.snap;
        let linePoints = pointsData.line;
        let flowStartX = pointsData.startX;
        let flowEndX = pointsData.endX;

        let startPoint = null;
        let isDraggingLine = false;
        let currentMousePos = { x: 0, y: 0 };
        let nearestValidPoint = null;
        const connections = [];
        let originalConnectionLabels = null;

        const routineRects = [];
        let selectedRoutineIndex = 0;

        let routineIdCounter = 0;
        let loopIdCounter = 0;
        let currentProjectFile = null;
        let saveCounter = 1;
        let fileHandle = null;

        function createDefaultAvtpkData(type) {
            const defaults = {
                a: {
                    label: 'Audio',
                    type: 'audio',
                    path: '',
                    volume: 1.0,
                    startTime: 0,
                    duration: -1,
                    stopWithRoutine: true,
                    forceEndRoutine: true
                },
                v: {
                    label: 'Video',
                    type: 'video',
                    path: '',
                    volume: 1.0,
                    size: [null, null],
                    anchor: 'center',
                    loop: false,
                    startTime: 0,
                    duration: -1,
                    units: 'from exp settings',
                    opacity: 1.0,
                    stopWithRoutine: true,
                    forceEndRoutine: true
                },
                t: {
                    label: 'Text',
                    type: 'text',
                    text: 'Sample Text',
                    font: 'Arial',
                    letterHeight: 0.05,
                    color: 'white',
                    pos: [0, 0],
                    ori: 0,
                    opacity: 1.0,
                    units: 'from exp settings',
                    startTime: 0,
                    duration: 3000,
                    contrast: 1.0,
                    wrapWidth: undefined,
                    flip: 'None',
                    languageStyle: 'LTR',
                    draggable: false
                },
                p: {
                    label: 'Picture',
                    type: 'image',
                    path: '',
                    size: [null, null],
                    pos: [0, 0],
                    opacity: 1.0,
                    startTime: 0,
                    duration: 3000,
                    ori: 0,
                    flip: 'None',
                    units: 'from exp settings'
                },
                k: {
                    label: 'Keyboard',
                    type: 'keyboard',
                    keys: '',
                    startTime: 0,
                    duration: -1,
                    forceEndRoutine: true
                }
            };
            return defaults[type] ? JSON.parse(JSON.stringify(defaults[type])) : null;
        }

        function createAvtpkComponent(type) {
            const component = createDefaultAvtpkData(type);
            if (component) {
                component.id = Date.now() + Math.random().toString(36).substr(2, 9); // 唯一ID
                component.enabled = true;
            }
            return component;
        }

        function createRoutineRect(index) {
            const snapPoint = snapPoints[index];
            const rect = {
                id: ++routineIdCounter,
                name: 'routine_' + routineIdCounter,
                x: snapPoint.x - 100,
                y: snapPoint.y - 60,  // 初始位置以顶部为基准
                width: 200,
                height: 120,
                borderRadius: 10,
                isDragging: false,
                offsetX: 0,
                offsetY: 0,
                keys: 'Space, F, J',
                duration: 3000,
                avtpComponents: [
                    createAvtpkComponent('k')
                ]
            };
            updateRoutineHeight(rect);
            return rect;
        }
        
        // 根据 AVTP 组件数量动态计算 routine 块的高度
        function calculateRoutineHeight(rect) {
            const padding = 16;
            const timelineLineHeight = 28;
            const headerHeight = 50;
            const minHeight = 140;
            const extraPadding = 24;
            
            let requiredHeight = padding + headerHeight + extraPadding;
            
            const avtpComponents = rect.avtpComponents || [];
            const enabledComponents = avtpComponents.filter(c => c && c.enabled);
            
            // 所有 AVTPK 组件都使用 timeline 样式显示，统一使用 timelineLineHeight
            const allAvtpkComponents = enabledComponents.filter(c => 
                ['keyboard', 'audio', 'video', 'text', 'image'].includes(c.type)
            );
            if (allAvtpkComponents.length > 0) {
                requiredHeight += allAvtpkComponents.length * timelineLineHeight;
            }
            
            return Math.max(minHeight, requiredHeight);
        }
        
        // 更新 routine 块的高度
        function updateRoutineHeight(rect) {
            rect.height = calculateRoutineHeight(rect);
        }
        
        // 更新所有 routine 块的高度
        function updateAllRoutineHeights() {
            routineRects.forEach(rect => {
                updateRoutineHeight(rect);
            });
            updateCanvasWidthForRoutines();
        }
        
        // 根据所有 routine 块的高度更新 canvas 高度
        function updateCanvasWidthForRoutines() {
        }

        // 初始时不添加任何 routine，让用户从零开始
        // routineRects.push(createRoutineRect(0));
        // routineRects.push(createRoutineRect(1));

        let activeAvtp = null;
        let activeAvtpComponent = null;
        let activeDragRect = null;
        let activeConnection = null;

        const snapDistance = 80;
        const pointClickRadius = 20;
        const lineSnapRadius = 80;
        const baseOffsetY = 150;
        const offsetYStep = 80;

        function getMaxDepthForSameEndpoints(conn, allConnections) {
            const startLabel = conn.start.label;
            const endLabel = conn.end.label;
            let maxDepth = -1;

            for (const other of allConnections) {
                if (other === conn) continue;
                const isSameEndpoints = (other.start.label === startLabel && other.end.label === endLabel) ||
                                        (other.start.label === endLabel && other.end.label === startLabel);
                if (isSameEndpoints) {
                    maxDepth = Math.max(maxDepth, other.depth);
                }
            }

            return maxDepth;
        }

        function getNestingDepth(conn, allConnections) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const connMin = Math.min(startLabel, endLabel);
            const connMax = Math.max(startLabel, endLabel);
            
            let maxContainedDepth = -1;
            
            for (const other of allConnections) {
                if (other === conn) continue;
                const otherStartLabel = parseInt(other.start.label);
                const otherEndLabel = parseInt(other.end.label);
                const otherMin = Math.min(otherStartLabel, otherEndLabel);
                const otherMax = Math.max(otherStartLabel, otherEndLabel);
                
                if (connMin <= otherMin && connMax >= otherMax) {
                    if (connMin === otherMin && connMax === otherMax) {
                        const connIndex = allConnections.indexOf(conn);
                        const otherIndex = allConnections.indexOf(other);
                        if (connIndex > otherIndex) {
                            maxContainedDepth = Math.max(maxContainedDepth, other.depth);
                        }
                    } else {
                        maxContainedDepth = Math.max(maxContainedDepth, other.depth);
                    }
                }
            }
            
            return maxContainedDepth + 1;
        }

        function rebuildAllConnectionDepths() {
            if (connections.length === 0) return;
            
            let changed = true;
            let iterations = 0;
            const maxIterations = connections.length + 1;
            
            while (changed && iterations < maxIterations) {
                changed = false;
                iterations++;
                
                for (const conn of connections) {
                    const oldDepth = conn.depth;
                    const newDepth = getNestingDepth(conn, connections);
                    
                    if (newDepth !== oldDepth) {
                        conn.depth = newDepth;
                        changed = true;
                    }
                }
            }
        }
        
        function rebuildAllConnectionDepthsForPreview(allConnections, previewConn) {
            if (allConnections.length === 0) return;
            
            let changed = true;
            let iterations = 0;
            const maxIterations = allConnections.length + 1;
            
            while (changed && iterations < maxIterations) {
                changed = false;
                iterations++;
                
                for (const conn of allConnections) {
                    const oldDepth = conn.depth;
                    const newDepth = getNestingDepthForPreview(conn, allConnections);
                    
                    if (newDepth !== oldDepth) {
                        conn.depth = newDepth;
                        changed = true;
                    }
                }
            }
        }
        
        function getNestingDepthForPreview(conn, allConnections) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const connMin = Math.min(startLabel, endLabel);
            const connMax = Math.max(startLabel, endLabel);
            
            let maxContainedDepth = -1;
            
            for (const other of allConnections) {
                if (other === conn) continue;
                const otherStartLabel = parseInt(other.start.label);
                const otherEndLabel = parseInt(other.end.label);
                const otherMin = Math.min(otherStartLabel, otherEndLabel);
                const otherMax = Math.max(otherStartLabel, otherEndLabel);
                
                if (connMin <= otherMin && connMax >= otherMax) {
                    if (connMin === otherMin && connMax === otherMax) {
                        const connIndex = allConnections.indexOf(conn);
                        const otherIndex = allConnections.indexOf(other);
                        if (connIndex > otherIndex) {
                            maxContainedDepth = Math.max(maxContainedDepth, other.depth);
                        }
                    } else {
                        maxContainedDepth = Math.max(maxContainedDepth, other.depth);
                    }
                }
            }
            
            return maxContainedDepth + 1;
        }
        
        function getConnectionOffsetY(conn, allConnections) {
            return baseOffsetY + conn.depth * offsetYStep;
        }

        function getFollowRectPosition(conn) {
            const offsetY = getConnectionOffsetY(conn, connections);
            const cornerY = conn.start.y + offsetY;
            const middleX = (conn.start.x + conn.end.x) / 2;
            
            return {
                x: middleX,
                y: cornerY,
                width: 60,
                height: 30,
                depth: conn.depth,
                label: conn.depth + 1
            };
        }

        // Get all follow rectangle positions for all connections
        function getAllFollowRectPositions() {
            return connections.map(conn => getFollowRectPosition(conn));
        }

        function isOverlapping(conn, allConnections) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const connMin = Math.min(startLabel, endLabel);
            const connMax = Math.max(startLabel, endLabel);
            for (const other of allConnections) {
                const otherStartLabel = parseInt(other.start.label);
                const otherEndLabel = parseInt(other.end.label);
                const otherMin = Math.min(otherStartLabel, otherEndLabel);
                const otherMax = Math.max(otherStartLabel, otherEndLabel);
                const isSame = connMin === otherMin && connMax === otherMax;
                const sharesEndpoint = (startLabel === otherStartLabel || startLabel === otherEndLabel ||
                                       endLabel === otherStartLabel || endLabel === otherEndLabel);
                const isContained = (otherMin <= connMin && otherMax >= connMax) ||
                                   (connMin <= otherMin && connMax >= otherMax);
                const isSeparate = connMax < otherMin || connMin > otherMax;
                if (isSame || sharesEndpoint || isContained || isSeparate) {
                    continue;
                }
                return true;
            }
            return false;
        }

        function drawRoundedRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function drawPreviewLine() {
            if (isDraggingLine && startPoint) {
                const targetPoint = nearestValidPoint || { x: currentMousePos.x, y: currentMousePos.y };
                
                const newStartLabel = parseInt(startPoint.label);
                const newEndLabel = parseInt(targetPoint.label);
                const newMin = Math.min(newStartLabel, newEndLabel);
                const newMax = Math.max(newStartLabel, newEndLabel);

                const previewConn = { 
                    start: startPoint, 
                    end: targetPoint, 
                    depth: 0,
                    loopName: 'preview'
                };
                const allConnsForPreview = [...connections, previewConn];
                
                rebuildAllConnectionDepths();
                const allConnsWithRebuiltDepth = [...connections, previewConn];
                rebuildAllConnectionDepthsForPreview(allConnsWithRebuiltDepth, previewConn);
                
                const offsetY = getConnectionOffsetY(previewConn, allConnsForPreview);

                ctx.beginPath();
                ctx.moveTo(startPoint.x, startPoint.y);
                ctx.lineTo(startPoint.x, startPoint.y + offsetY);
                ctx.lineTo(targetPoint.x, startPoint.y + offsetY);
                ctx.lineTo(targetPoint.x, targetPoint.y);
                ctx.stroke();

                const cornerY = startPoint.y + offsetY;
                const middleX = (startPoint.x + targetPoint.x) / 2;
                const followRectWidth = 60;
                const followRectHeight = 30;
                const followRectRadius = 8;

                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.5;
                drawRoundedRect(middleX - followRectWidth / 2, cornerY - followRectHeight / 2, followRectWidth, followRectHeight, followRectRadius);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#000000';
                ctx.font = '500 16px -apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(previewConn.depth + 1, middleX, cornerY);

                ctx.setLineDash([]);
            }
        }

        function drawConnectionLines() {
            let previewConn = null;
            let allConns = connections;
            
            if (isDraggingLine && startPoint && nearestValidPoint) {
                previewConn = { 
                    start: startPoint, 
                    end: nearestValidPoint, 
                    depth: 0,
                    loopName: 'preview'
                };
                const allConnsWithPreview = [...connections, previewConn];
                rebuildAllConnectionDepthsForPreview(allConnsWithPreview, previewConn);
                allConns = allConnsWithPreview;
            }

            const sortedConnections = [...connections].sort((a, b) => a.depth - b.depth);
            
            sortedConnections.forEach(conn => {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.setLineDash([]);

                const offsetY = getConnectionOffsetY(conn, allConns);

                ctx.beginPath();
                ctx.moveTo(conn.start.x, conn.start.y);
                ctx.lineTo(conn.start.x, conn.start.y + offsetY);
                ctx.lineTo(conn.end.x, conn.start.y + offsetY);
                ctx.lineTo(conn.end.x, conn.end.y);
                ctx.stroke();

                const cornerY = conn.start.y + offsetY;
                const middleX = (conn.start.x + conn.end.x) / 2;
                const followRectWidth = 60;
                const followRectHeight = 30;
                const followRectRadius = 8;

                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.5;
                drawRoundedRect(middleX - followRectWidth / 2, cornerY - followRectHeight / 2, followRectWidth, followRectHeight, followRectRadius);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#000000';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const loopReps = conn.loopReps || 1;
                ctx.font = 'bold 12px -apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif';
                ctx.fillText(loopReps, middleX, cornerY);
            });
        }

        function draw() {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            ctx.save();
            ctx.translate(viewportX * scale, viewportY * scale);
            ctx.scale(scale, scale);

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(flowStartX, lineY);
            ctx.lineTo(flowEndX, lineY);
            ctx.stroke();

            drawConnectionLines();
            drawPreviewLine();

            linePoints.forEach(point => {
                const isStart = startPoint && point.label === startPoint.label;
                const isConnected = connections.some(c => c.start.label === point.label || c.end.label === point.label);
                const isNearest = nearestValidPoint && point.label === nearestValidPoint.label;

                let radius = 4;
                let fillColor = '#ffffff';
                let strokeColor = '#000000';

                if (isConnected) {
                    radius = 5;
                    fillColor = '#000000';
                    strokeColor = '#000000';
                } else if (isStart && isDraggingLine) {
                    radius = 5;
                    fillColor = '#000000';
                    strokeColor = '#000000';
                } else if (isNearest && isDraggingLine) {
                    radius = 5;
                    fillColor = '#ffffff';
                    strokeColor = '#000000';
                }

                ctx.beginPath();
                ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = fillColor;
                ctx.fill();
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });

            // 先绘制所有非拖拽的 routine
            routineRects.forEach((rect, index) => {
                if (rect !== activeDragRect) {
                    drawDragRect(rect, index);
                }
            });
            
            // 最后绘制正在拖拽的 routine（在最上层）
            if (activeDragRect) {
                const draggedIndex = routineRects.indexOf(activeDragRect);
                drawDragRect(activeDragRect, draggedIndex);
            }

            ctx.restore();
        }

        function drawDragRect(dragRect, index) {
            const isSelected = index === selectedRoutineIndex;
            
            if (isSelected) {
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#0066cc';
                ctx.lineWidth = 2.5;
            } else {
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
            }
            
            drawRoundedRect(dragRect.x, dragRect.y, dragRect.width, dragRect.height, dragRect.borderRadius);
            ctx.fill();

            const avtpComponents = dragRect.avtpComponents || [];
            const enabledComponents = avtpComponents.filter(c => c && c.enabled);
            
            const padding = 16;
            const lineHeight = 14;
            const timelineLineHeight = 28;
            const headerHeight = 50;
            const extraPadding = 24;
            
            ctx.fillStyle = isSelected ? '#0066cc' : '#000000';
            ctx.font = '700 16px -apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(dragRect.name, dragRect.x + padding, dragRect.y + padding + 12);
            
            let currentY = dragRect.y + padding + headerHeight;
            
            // 清空组件点击区域
            dragRect.componentHitAreas = [];
            
            // 所有 AVTPK 组件使用统一的 timeline 样式显示
            const allAvtpkComponents = enabledComponents.filter(c => ['keyboard', 'audio', 'video', 'text', 'image'].includes(c.type));
            
            if (allAvtpkComponents.length > 0) {
                const maxDuration = Math.max(
                    ...allAvtpkComponents.map(c => {
                        const startTime = c.startTime || 0;
                        const duration = c.duration || 0;
                        return startTime + (duration > 0 ? duration : 3);
                    }),
                    3
                );
                
                const letterWidth = 16;
                const letterGap = 4;
                const timelineWidth = dragRect.width - padding * 2 - letterWidth - letterGap;
                const timelineStartX = dragRect.x + padding + letterWidth + letterGap;
                
                const typeToKey = {
                    'keyboard': 'k',
                    'audio': 'a',
                    'video': 'v',
                    'text': 't',
                    'image': 'p'
                };
                
                const typeColors = {
                    'keyboard': '#e74c3c',
                    'audio': '#3498db',
                    'video': '#9b59b6',
                    'text': '#2ecc71',
                    'image': '#f39c12'
                };
                
                // 浅色版本的颜色（用于无限 duration）
                const typeColorsLight = {
                    'keyboard': '#fadbd8',
                    'audio': '#d6eaf8',
                    'video': '#e8daef',
                    'text': '#d5f5e3',
                    'image': '#fdebd0'
                };
                
                allAvtpkComponents.forEach((comp, compIndex) => {
                    const typeKey = typeToKey[comp.type];
                    if (!typeKey) return;
                    
                    const startTime = comp.startTime || 0;
                    const isInfinite = comp.duration === -1;
                    const duration = isInfinite ? maxDuration : (comp.duration > 0 ? comp.duration : 3);
                    
                    const startX = timelineStartX + (startTime / maxDuration) * timelineWidth;
                    const barWidth = (duration / maxDuration) * timelineWidth;
                    
                    // 绘制背景 timeline
                    ctx.fillStyle = '#ecf0f1';
                    ctx.fillRect(timelineStartX, currentY - 5, timelineWidth, 10);
                    
                    // 绘制组件颜色条
                    if (isInfinite) {
                        // 无限 duration：使用浅色填充 + 边框
                        ctx.fillStyle = typeColorsLight[comp.type];
                        ctx.fillRect(startX, currentY - 5, Math.max(barWidth, 4), 10);
                        // 绘制边框
                        ctx.strokeStyle = typeColors[comp.type];
                        ctx.lineWidth = 2;
                        ctx.strokeRect(startX, currentY - 5, Math.max(barWidth, 4), 10);
                    } else {
                        // 有限 duration：使用正常颜色填充
                        ctx.fillStyle = typeColors[comp.type];
                        ctx.fillRect(startX, currentY - 5, Math.max(barWidth, 4), 10);
                    }
                    
                    // 绘制类型字母
                    ctx.font = 'bold 16px -apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif';
                    ctx.fillStyle = typeColors[comp.type];
                    ctx.textAlign = 'left';
                    ctx.fillText(typeKey.toUpperCase(), dragRect.x + padding, currentY);
                    ctx.textAlign = 'left';
                    
                    // 存储组件绘制区域信息用于点击检测
                    if (!dragRect.componentHitAreas) dragRect.componentHitAreas = [];
                    dragRect.componentHitAreas[compIndex] = {
                        x: dragRect.x + padding,
                        y: currentY - 14,
                        width: dragRect.width - padding * 2,
                        height: 28,
                        component: comp
                    };
                    
                    currentY += timelineLineHeight;
                });
            }
            
            // 绘制起始时间和结束时间
            if (allAvtpkComponents.length > 0) {
                const maxDuration = Math.max(
                    ...allAvtpkComponents.map(c => {
                        const startTime = c.startTime || 0;
                        const duration = c.duration > 0 ? c.duration : (c.duration === -1 ? 0 : 3);
                        return startTime + duration;
                    }),
                    3
                );
                
                // 检查是否有 Keyboard 组件且开启了 forceEndRoutine
                const hasKeyboardWithForceEnd = allAvtpkComponents.some(c => 
                    c.type === 'keyboard' && c.forceEndRoutine === true
                );
                
                // 检查是否所有组件都是无限 duration
                const allInfinite = allAvtpkComponents.every(c => c.duration === -1);
                
                const startTime = 0;
                const endTime = maxDuration;
                
                // 时间显示区域在组件下方
                const timeY = dragRect.y + dragRect.height - extraPadding + 8;
                
                ctx.font = '11px -apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif';
                ctx.fillStyle = '#7f8c8d';
                ctx.textAlign = 'left';
                ctx.fillText(Math.round(startTime) + ' ms', dragRect.x + padding, timeY);
                ctx.textAlign = 'right';
                
                if (allInfinite && hasKeyboardWithForceEnd) {
                    // 最大时间无限，但有 Keyboard 组件且开启了 forceEndRoutine，显示手指图标
                    if (tapIconLoaded) {
                        const iconSize = 16;
                        ctx.drawImage(tapIcon, dragRect.x + dragRect.width - padding - iconSize, timeY - iconSize/2 - 2, iconSize, iconSize);
                    } else {
                        // 图标未加载完成，显示无限符号作为后备
                        ctx.font = '14px -apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif';
                        ctx.fillText('∞', dragRect.x + dragRect.width - padding, timeY);
                    }
                } else if (allInfinite) {
                    // 所有组件都是无限 duration，显示无限符号
                    ctx.font = '14px -apple-system, BlinkMacSystemFont, SF Pro Text, sans-serif';
                    ctx.fillText('∞', dragRect.x + dragRect.width - padding, timeY);
                } else {
                    // 正常显示结束时间
                    ctx.fillText(Math.round(endTime) + ' ms', dragRect.x + dragRect.width - padding, timeY);
                }
                ctx.textAlign = 'left';
            }

            if (isSelected) {
                ctx.strokeStyle = '#0066cc';
                ctx.lineWidth = 2.5;
            } else {
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
            }
            drawRoundedRect(dragRect.x, dragRect.y, dragRect.width, dragRect.height, dragRect.borderRadius);
            ctx.stroke();
        }

        function snapToPoint(rect) {
            const rectCenterX = rect.x + rect.width / 2;
            const rectTopY = rect.y;

            let nearestPoint = null;
            let minDistance = Infinity;

            snapPoints.forEach(point => {
                const distance = Math.sqrt(
                    Math.pow(rectCenterX - point.x, 2) +
                    Math.pow(rectTopY - point.y, 2)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestPoint = point;
                }
            });

            rect.x = nearestPoint.x - rect.width / 2;
            // 保持 y 位置顶部对齐，不重新居中
            rect.y = nearestPoint.y - 50;
            return true;
        }

        function findNearestSnapPoint(rect) {
            const rectCenterX = rect.x + rect.width / 2;
            const rectCenterY = rect.y + rect.height / 2;

            let nearestPoint = null;
            let minDistance = Infinity;

            snapPoints.forEach(point => {
                const distance = Math.sqrt(
                    Math.pow(rectCenterX - point.x, 2) +
                    Math.pow(rectCenterY - point.y, 2)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestPoint = point;
                }
            });

            return nearestPoint;
        }

        function hasDragRectAtPoint(point) {
            for (const rect of routineRects) {
                const rectCenterX = rect.x + rect.width / 2;
                const rectCenterY = rect.y + rect.height / 2;
                const distance = Math.sqrt(
                    Math.pow(rectCenterX - point.x, 2) +
                    Math.pow(rectCenterY - point.y, 2)
                );
                if (distance < 10) {
                    return true;
                }
            }
            return false;
        }

        function hasDragRectInLoopRange(startPoint, endPoint) {
            const startLabel = parseInt(startPoint.label);
            const endLabel = parseInt(endPoint.label);
            const minLabel = Math.min(startLabel, endLabel);
            const maxLabel = Math.max(startLabel, endLabel);
            
            for (const point of snapPoints) {
                const pointLabel = parseInt(point.label);
                if (pointLabel > minLabel && pointLabel < maxLabel) {
                    if (hasDragRectAtPoint(point)) {
                        return true;
                    }
                }
            }
            return false;
        }

        function findNearestValidPoint(pos) {
            let nearest = null;
            let minDist = lineSnapRadius;

            for (const point of linePoints) {
                if (startPoint && point.label === startPoint.label) continue;
                const dist = Math.sqrt(
                    Math.pow(pos.x - point.x, 2) + Math.pow(pos.y - point.y, 2)
                );
                if (dist < minDist) {
                    minDist = dist;
                    nearest = point;
                }
            }
            return nearest;
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            return {
                x: (screenX / scale) - viewportX,
                y: (screenY / scale) - viewportY
            };
        }

        function isInsideRect(x, y, rect) {
            return x >= rect.x && x <= rect.x + rect.width &&
                   y >= rect.y && y <= rect.y + rect.height;
        }

        function getDragRectAtPos(x, y) {
            for (const rect of routineRects) {
                if (isInsideRect(x, y, rect)) return rect;
            }
            return null;
        }

        function isInsidePoint(pos, point) {
            const distance = Math.sqrt(
                Math.pow(pos.x - point.x, 2) + Math.pow(pos.y - point.y, 2)
            );
            return distance < pointClickRadius;
        }

        function isInsideAvtpArea(pos, rect) {
            const mainRectHeight = rect.height * 0.7;
            const keyRectHeight = rect.height * 0.3;
            const isInsideKey = pos.x >= rect.x && pos.x <= rect.x + rect.width &&
                   pos.y >= rect.y + mainRectHeight && pos.y <= rect.y + mainRectHeight + keyRectHeight;
            return isInsideKey;
        }

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();

            // 计算排除 chatbot 后的画布中心
            const chatbotWidth = chatbotPanel.offsetWidth;
            const canvasCenterX = (window.innerWidth - chatbotWidth) / 2;
            const canvasCenterY = window.innerHeight / 2;

            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const newScale = Math.max(minScale, Math.min(maxScale, scale * zoomFactor));

            // 获取 flowchart 内容的中心点
            const flowchartCenter = getFlowchartCenter();
            
            // 将 flowchart 中心点置于画布中心（排除 chatbot）
            // 屏幕坐标 = (世界坐标 + viewport) * scale
            // 所以 viewport = 屏幕坐标/scale - 世界坐标
            viewportX = canvasCenterX / newScale - flowchartCenter.x;
            viewportY = canvasCenterY / newScale - flowchartCenter.y;
            scale = newScale;

            draw();
            updateZoomLevelDisplay();
        }, { passive: false });

        canvas.addEventListener('mousedown', (e) => {
            const pos = getMousePos(e);

            if (e.button === 1 || e.button === 0) {
                const clickedRect = getDragRectAtPos(pos.x, pos.y);

                if (clickedRect) {
                    const clickedIndex = routineRects.indexOf(clickedRect);
                    selectedRoutineIndex = clickedIndex;
                    activeDragRect = clickedRect;
                    
                    clickedRect.isDragging = true;
                    clickedRect.offsetX = pos.x - clickedRect.x;
                    clickedRect.offsetY = pos.y - clickedRect.y;
                    canvas.style.cursor = 'grabbing';
                    updateRoutineCount();
                    draw();
                    return;
                }

                e.preventDefault();
                isCanvasPanning = true;
                canvasPanStartX = e.clientX;
                canvasPanStartY = e.clientY;
                canvasPanStartViewportX = viewportX;
                canvasPanStartViewportY = viewportY;
                canvas.style.cursor = 'grabbing';
                return;
            }

            for (const point of linePoints) {
                if (isInsidePoint(pos, point)) {
                    startPoint = point;
                    isDraggingLine = true;
                    currentMousePos = pos;
                    draw();
                    return;
                }
            }

            selectedRoutineIndex = -1;
            updateRoutineCount();
            draw();
        });

        canvas.addEventListener('mousemove', (e) => {
            const pos = getMousePos(e);
            currentMousePos = pos;

            if (isCanvasPanning) {
                const deltaX = (e.clientX - canvasPanStartX) / scale;
                const deltaY = (e.clientY - canvasPanStartY) / scale;
                viewportX = canvasPanStartViewportX + deltaX;
                viewportY = canvasPanStartViewportY + deltaY;
                draw();
                return;
            }

            if (activeDragRect && activeDragRect.isDragging) {
                activeDragRect.x = pos.x - activeDragRect.offsetX;
                activeDragRect.y = pos.y - activeDragRect.offsetY;
                draw();
            } else if (isDraggingLine) {
                nearestValidPoint = findNearestValidPoint(pos);
                draw();
            } else {
                let isOverLoopBlock = false;
                for (const conn of connections) {
                    if (isInsideLoopBlock(pos, conn, connections)) {
                        isOverLoopBlock = true;
                        break;
                    }
                }
                if (isOverLoopBlock) {
                    canvas.style.cursor = 'pointer';
                } else if (getDragRectAtPos(pos.x, pos.y)) {
                    canvas.style.cursor = 'pointer';
                } else {
                    canvas.style.cursor = 'grab';
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            const pos = getMousePos(e);

            if (isCanvasPanning) {
                isCanvasPanning = false;
                canvas.style.cursor = 'grab';
                return;
            }

            if (activeDragRect && activeDragRect.isDragging) {
                activeDragRect.isDragging = false;
                
                const draggedIndex = routineRects.indexOf(activeDragRect);
                let targetIndex = -1;
                
                // 检查是否释放到另一个 routine 的位置上
                const dragRectCenter = {
                    x: activeDragRect.x + activeDragRect.width / 2,
                    y: activeDragRect.y + activeDragRect.height / 2
                };
                
                for (let i = 0; i < routineRects.length; i++) {
                    if (i === draggedIndex) continue;
                    
                    const otherRect = routineRects[i];
                    const otherCenter = {
                        x: otherRect.x + otherRect.width / 2,
                        y: otherRect.y + otherRect.height / 2
                    };
                    
                    // 计算两个 routine 中心的距离
                    const distance = Math.sqrt(
                        Math.pow(dragRectCenter.x - otherCenter.x, 2) +
                        Math.pow(dragRectCenter.y - otherCenter.y, 2)
                    );
                    
                    // 如果距离小于阈值（比如 routine 宽度的一半），认为是交换
                    if (distance < activeDragRect.width * 0.8) {
                        targetIndex = i;
                        break;
                    }
                }
                
                if (targetIndex !== -1) {
                    saveState();
                    currentProjectFile = null;
                    fileHandle = null;
                    // 交换两个 routine 在数组中的位置
                    const temp = routineRects[draggedIndex];
                    routineRects[draggedIndex] = routineRects[targetIndex];
                    routineRects[targetIndex] = temp;
                    
                    // 更新选中的索引
                    if (selectedRoutineIndex === draggedIndex) {
                        selectedRoutineIndex = targetIndex;
                    } else if (selectedRoutineIndex === targetIndex) {
                        selectedRoutineIndex = draggedIndex;
                    }
                }
                
                // 重新分配所有 routine 到正确的 snap points
                reassignSnapPoints();
                
                draw();
                canvas.style.cursor = 'grab';
                activeDragRect = null;
                return;
            }

            if (isDraggingLine && startPoint) {
                const targetPoint = nearestValidPoint || findNearestValidPoint(pos);
                if (targetPoint && hasDragRectInLoopRange(startPoint, targetPoint)) {
                    saveState();
                    currentProjectFile = null;
                    fileHandle = null;

                    const newStartLabel = parseInt(startPoint.label);
                    const newEndLabel = parseInt(targetPoint.label);
                    const newMin = Math.min(newStartLabel, newEndLabel);
                    const newMax = Math.max(newStartLabel, newEndLabel);

                    const newConn = {
                        start: startPoint,
                        end: targetPoint,
                        depth: 0,
                        loopName: `trials_${++loopIdCounter}`,
                        loopReps: 1,
                        loopType: 'sequential',
                        loopConditions: '',
                        loopIsTrials: true
                    };
                    connections.push(newConn);
                    
                    if (isOverlapping(newConn, connections)) {
                        connections.pop();
                    } else {
                        rebuildAllConnectionDepths();
                    }
                }
            }

            isDraggingLine = false;
            nearestValidPoint = null;
            draw();
            startPoint = null;
        });

        canvas.addEventListener('mouseleave', () => {
            if (isCanvasPanning) {
                isCanvasPanning = false;
                canvas.style.cursor = 'grab';
            }
            if (activeDragRect && activeDragRect.isDragging) {
                activeDragRect.isDragging = false;
                snapToPoint(activeDragRect);
                draw();
            }
            if (isDraggingLine) {
                isDraggingLine = false;
                nearestValidPoint = null;
                startPoint = null;
                draw();
            }
        });

        function isInsideConnection(pos, conn) {
            const tolerance = 20;
            const offsetY = getConnectionOffsetY(conn, connections);

            const seg1Start = { x: conn.start.x, y: conn.start.y };
            const seg1End = { x: conn.start.x, y: conn.start.y + offsetY };
            if (isNearSegment(pos, seg1Start, seg1End, tolerance)) return true;

            const seg2Start = { x: conn.start.x, y: conn.start.y + offsetY };
            const seg2End = { x: conn.end.x, y: conn.start.y + offsetY };
            if (isNearSegment(pos, seg2Start, seg2End, tolerance)) return true;

            const seg3Start = { x: conn.end.x, y: conn.start.y + offsetY };
            const seg3End = { x: conn.end.x, y: conn.end.y };
            if (isNearSegment(pos, seg3Start, seg3End, tolerance)) return true;

            return false;
        }

        function isNearSegment(pos, start, end, tolerance) {
            const dx = end.x - start.x;
            const dy = end.y - start.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            if (length === 0) return false;

            const t = Math.max(0, Math.min(1, ((pos.x - start.x) * dx + (pos.y - start.y) * dy) / (length * length)));
            const projX = start.x + t * dx;
            const projY = start.y + t * dy;
            const dist = Math.sqrt((pos.x - projX) * (pos.x - projX) + (pos.y - projY) * (pos.y - projY));
            return dist < tolerance;
        }

        function isInsideLoopBlock(pos, conn, allConns) {
            const offsetY = getConnectionOffsetY(conn, allConns);
            const cornerY = conn.start.y + offsetY;
            const middleX = (conn.start.x + conn.end.x) / 2;
            const followRectWidth = 60;
            const followRectHeight = 30;
            return pos.x >= middleX - followRectWidth / 2 &&
                   pos.x <= middleX + followRectWidth / 2 &&
                   pos.y >= cornerY - followRectHeight / 2 &&
                   pos.y <= cornerY + followRectHeight / 2;
        }

        function isInsideAvtp(pos, avtpKey, rect) {
            const mainRectHeight = rect.height * 0.7;
            const letterWidth = rect.width / 4;
            const avtpIndex = ['a', 'v', 't', 'p'].indexOf(avtpKey);

            const letterX = rect.x + letterWidth * (avtpIndex + 0.5);
            const letterY = rect.y + mainRectHeight * 0.65;
            const clickRadius = 15;

            const distance = Math.sqrt(
                Math.pow(pos.x - letterX, 2) + Math.pow(pos.y - letterY, 2)
            );
            return distance < clickRadius;
        }

        function isInsideKeyArea(pos, rect) {
            const mainRectHeight = rect.height * 0.7;
            const keyRectHeight = rect.height * 0.3;

            const keyAreaX = rect.x;
            const keyAreaY = rect.y + mainRectHeight;
            const keyAreaWidth = rect.width;
            const keyAreaHeight = keyRectHeight;

            return pos.x >= keyAreaX && pos.x <= keyAreaX + keyAreaWidth &&
                   pos.y >= keyAreaY && pos.y <= keyAreaY + keyAreaHeight;
        }

        function collectAutoDetectedVariables() {
            const variableSet = new Set();
            const randomPatternSet = new Set();
            
            // Collect from routineRects (支持新的 avtpComponents 数组和旧的 avtpData 对象)
            routineRects.forEach(rect => {
                // 新的 avtpComponents 数组方式
                if (rect.avtpComponents && Array.isArray(rect.avtpComponents)) {
                    rect.avtpComponents.forEach(component => {
                        if (component && typeof component === 'object') {
                            Object.keys(component).forEach(dataKey => {
                                const value = component[dataKey];
                                if (typeof value === 'string' && value.startsWith('$')) {
                                    variableSet.add(value);
                                }
                                // 检测 #[start,end,total_num] 格式的随机数表达式
                                if (typeof value === 'string' && value.startsWith('#[')) {
                                    randomPatternSet.add(value);
                                }
                            });
                        }
                    });
                }
                // 旧的 avtpData 对象方式（向后兼容）
                else if (rect.avtpData) {
                    Object.keys(rect.avtpData).forEach(key => {
                        const data = rect.avtpData[key];
                        if (data && typeof data === 'object') {
                            Object.keys(data).forEach(dataKey => {
                                const value = data[dataKey];
                                if (typeof value === 'string' && value.startsWith('$')) {
                                    variableSet.add(value);
                                }
                                // 检测 #[start,end,total_num] 格式的随机数表达式
                                if (typeof value === 'string' && value.startsWith('#[')) {
                                    randomPatternSet.add(value);
                                }
                            });
                        }
                    });
                }
            });
            
            // Collect from connections (loops)
            connections.forEach(conn => {
                if (conn.loopConditions) {
                    try {
                        const parsed = JSON.parse(conn.loopConditions);
                        if (Array.isArray(parsed)) {
                            parsed.forEach(condition => {
                                Object.keys(condition).forEach(key => {
                                    if (key.startsWith('$')) {
                                        variableSet.add(key);
                                    }
                                    // 检测 #[start,end,total_num] 格式的随机数表达式
                                    if (typeof condition[key] === 'string' && condition[key].startsWith('#[')) {
                                        randomPatternSet.add(condition[key]);
                                    }
                                });
                            });
                        }
                    } catch (e) {
                        // Ignore parse errors
                    }
                }
            });
            
            return {
                variables: Array.from(variableSet).sort(),
                randomPatterns: Array.from(randomPatternSet).sort()
            };
        }

        function parseConditionsJSON(jsonStr) {
            if (!jsonStr || !jsonStr.trim()) return { variables: [], conditions: [] };
            
            try {
                const parsed = JSON.parse(jsonStr);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    // Extract all unique variable names from all conditions (excluding 'name')
                    const variableSet = new Set();
                    parsed.forEach(condition => {
                        Object.keys(condition).forEach(key => {
                            if (key !== 'name') {
                                variableSet.add(key);
                            }
                        });
                    });
                    const variables = Array.from(variableSet);
                    
                    // Extract condition names (row names) and their values
                    const conditions = parsed.map((condition, index) => {
                        const conditionName = condition.name || `Condition ${index + 1}`;
                        const values = {};
                        Object.keys(condition).forEach(key => {
                            if (key !== 'name') {
                                values[key] = condition[key];
                            }
                        });
                        return { name: conditionName, values };
                    });
                    
                    return { variables, conditions };
                }
                return { variables: [], conditions: [] };
            } catch (e) {
                return { variables: [], conditions: [] };
            }
        }

        function conditionsToJSON() {
            const rows = conditionsTableBody.querySelectorAll('tr');
            if (rows.length === 0) return '';
            
            const conditions = [];
            rows.forEach(row => {
                const nameInput = row.querySelector('.condition-row-name');
                if (nameInput && nameInput.value.trim()) {
                    const condition = { name: nameInput.value.trim() };
                    // 直接从表头获取所有变量名（跳过第一个 Condition 列和最后一个操作列）
                    const headerCells = Array.from(conditionsTableHeaderRow.children);
                    const valueInputs = row.querySelectorAll('td input:not(.condition-row-name)');
                    
                    // 遍历所有 value 输入框，从对应的表头获取变量名
                    valueInputs.forEach((valueInput, index) => {
                        // headerCells[0] 是 Condition 列，所以 index+1 对应第一个变量列
                        if (index + 1 < headerCells.length - 1) { // -1 是因为最后一个是操作列
                            const th = headerCells[index + 1];
                            const label = th.querySelector('label');
                            if (label) {
                                const varName = label.textContent.trim();
                                const val = valueInput.value;
                                condition[varName] = val !== undefined && val !== null ? val : '';
                            }
                        }
                    });
                    conditions.push(condition);
                }
            });
            
            return conditions.length > 0 ? JSON.stringify(conditions) : '';
        }

                        rect.avtpComponents.forEach(component => {
                            if (component && typeof component === 'object') {
                                // 检查并更新所有可能包含变量的字段
                                Object.keys(component).forEach(key => {
                                    const value = component[key];
                                    if (typeof value === 'string' && value.includes('$')) {
                                        // 替换变量值
                                        let updatedValue = value;
                                        variableNames.forEach(varName => {
                                            if (updatedValue.includes(varName)) {
                                                // 对于循环变量，这里只做占位符处理
                                                // 实际的值会在运行时由 PsychoPy 处理
                                                updatedValue = updatedValue.replace(new RegExp(varName, 'g'), varName);
                                            }
                                        });
                                        component[key] = updatedValue;
                                    }
                                });
                            }
                        });
                    }
                    // 旧的 avtpData 对象方式（向后兼容）
                    else if (rect.avtpData) {
                        Object.keys(rect.avtpData).forEach(avtpKey => {

                                Object.keys(data).forEach(key => {
                                    const value = data[key];
                                    if (typeof value === 'string' && value.includes('$')) {
                                        // 替换变量值

                                        variableNames.forEach(varName => {

                                                // 对于循环变量，这里只做占位符处理
                                                // 实际的值会在运行时由 PsychoPy 处理

            const clickedRect = getDragRectAtPos(pos.x, pos.y);

                let clickedComponent = null;
                if (clickedRect.componentHitAreas && clickedRect.componentHitAreas.length > 0) {
                    for (const hitArea of clickedRect.componentHitAreas) {
                        if (hitArea && pos.x >= hitArea.x && pos.x <= hitArea.x + hitArea.width &&
                            pos.y >= hitArea.y && pos.y <= hitArea.y + hitArea.height) {
                            clickedComponent = hitArea.component;

        function updatePoints() {
            currentRoutineCount = routineRects.length;
            canvasWidth = calculateCanvasWidth(currentRoutineCount);
            
            if (routineRects.length > 0) {
                const validRightXValues = routineRects
                    .map((rect, index) => {
                        if (!rect || rect.width === undefined || rect.height === undefined) return null;
                        const snapPoint = snapPoints[index];
                        if (!snapPoint) return null;
                        return snapPoint.x + rect.width / 2;
                    })
                    .filter(val => val !== null && !isNaN(val));
                
                if (validRightXValues.length > 0) {
                    const maxRoutineRight = Math.max(...validRightXValues);
                    const requiredWidth = maxRoutineRight + 100;
                    canvasWidth = Math.max(canvasWidth, requiredWidth);
                }
            }
            
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            ctx.scale(dpr, dpr);

            const connectionLabels = originalConnectionLabels !== null ?
                originalConnectionLabels.map((labels, i) => ({
                    startLabel: labels.startLabel,
                    endLabel: labels.endLabel,
                    depth: connections[i].depth,
                    loopName: connections[i].loopName,
                    loopReps: connections[i].loopReps,
                    loopType: connections[i].loopType,
                    loopConditions: connections[i].loopConditions,
                    loopIsTrials: connections[i].loopIsTrials
                })) :
                connections.map(conn => ({
                    startLabel: conn.start.label,
                    endLabel: conn.end.label,
                    depth: conn.depth,
                    loopName: conn.loopName,
                    loopReps: conn.loopReps,
                    loopType: conn.loopType,
                    loopConditions: conn.loopConditions,
                    loopIsTrials: conn.loopIsTrials
                }));

            const displayCount = Math.max(routineRects.length, minDisplayRoutines);
            pointsData = generatePoints(displayCount);
            snapPoints = pointsData.snap;
            linePoints = pointsData.line;
            flowStartX = pointsData.startX;
            flowEndX = pointsData.endX;
            reassignSnapPoints();

            for (let i = 0; i < connections.length; i++) {
                const labels = connectionLabels[i];
                const newStartPoint = linePoints.find(p => p.label === labels.startLabel);
                const newEndPoint = linePoints.find(p => p.label === labels.endLabel);
                if (newStartPoint && newEndPoint) {
                    connections[i].start = newStartPoint;
                    connections[i].end = newEndPoint;
                }
            }
        }

        function reassignSnapPoints() {
            routineRects.forEach((rect, index) => {
                // 只更新已有完整属性的 routine
                if (rect.width && rect.height) {
                    const snapPoint = snapPoints[index];
                    rect.x = snapPoint.x - rect.width / 2;
                    // 所有 routine 保持同一个顶部高度（基于 snap point 顶部对齐）
                    rect.y = snapPoint.y - 60;
                }
            });
        }
