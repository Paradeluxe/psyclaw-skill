name: rich_components
version: "1.0"
description: Test harness for audio + video + mouse + slider + text components

routines:
  - name: cue_audio
    duration: 1.0
    components:
      - type: audio
        path: assets/beep.wav
        volume: 0.8
        duration: 0.5

  - name: cue_video
    duration: 2.0
    components:
      - type: video
        path: assets/intro.mp4
        size: [0.5, 0.5]
        no_audio: true
        duration: 2.0

  - name: trial_mouse
    duration: 3.0
    components:
      - type: text
        text: "Click the colored square"
        height: 0.05
      - type: mouse
        saveMouseState: final
        forceEndRoutineOnPress: any click
        newClicksOnly: true
        clickable: [colored_square]
        storeCorrect: false
        duration: 3.0

  - name: trial_slider
    duration: 3.0
    components:
      - type: text
        text: "Rate your mood"
        height: 0.05
      - type: slider
        pos: [0, -0.3]
        size: [1.0, 0.1]
        initVal: 0.5
        granularity: 0
        ticks: [1, 2, 3, 4, 5, 6, 7]
        labels: ["1\nVery bad", "7\nVery good"]
        storeRating: true
        storeRatingTime: true
        storeHistory: false
        duration: 3.0

  - name: thanks
    duration: 2.0
    components:
      - type: text
        text: "Done!"
        height: 0.05

loops: []

stimuli: []