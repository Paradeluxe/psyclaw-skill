name: code_test
version: "1.0"
description: Real-world CodeComponent test — multiple phases, HTML escaping, JS code, all 7 component types in one experiment

routines:
  - name: trial
    duration: 2.0
    components:
      - type: text
        text: $word
        height: 0.1
      - type: keyboard
        keys: j, k
        correct_ans: $correct
        store: response
      - type: code
        name: rt_logger
        code_type: Py
        begin_routine: "trial_start = t"
        each_frame: "if 'resp' in thisExp.data and not logged: print('rt:', t - trial_start); logged = True"
        end_routine: "thisExp.addData('rt', t - trial_start)"

  - name: cleanup
    duration: 1.0
    components:
      - type: code
        name: html_escape_test
        begin_routine: "msg = '<b>\"hi\" & bye</b>'"
        end_routine: "print(msg)"

loops:
  - name: trial_loop
    start_routine: trial
    end_routine: trial
    n_rounds: 3
    order: sequential
    is_trials: true
    spreadsheet:
      file: code_test.xlsx
      columns:
        - name: word
          type: str
        - name: correct
          type: str
      rows:
        - word: apple
          correct: j
        - word: banana
          correct: k
        - word: cherry
          correct: j

stimuli: []