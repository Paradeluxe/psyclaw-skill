<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsyClaw</title>
    <link rel="icon" type="image/png" href="icon/psyclaw_icon_nobg.png">
    <!-- 字体加载优化 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- 使用 &display=swap 确保文字立即显示，字体加载后切换 -->
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Poppins:wght@400;500;600&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Brand Colors */
            --brand-blue: #1456f0;
            --brand-sky: #3daeff;
            --brand-pink: #ea5ec1;
            --brand-deep: #17437d;
            
            /* Blue Scale */
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-light: #60a5fa;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            
            /* Text Colors */
            --text-primary: #222222;
            --text-dark: #18181b;
            --text-charcoal: #181e25;
            --text-secondary: #45515e;
            --text-muted: #8e8e93;
            --text-helper: #5f5f5f;
            
            /* Surface Colors */
            --bg-white: #ffffff;
            --bg-light: #f0f0f0;
            --bg-glass: hsla(0, 0%, 100%, 0.4);
            --border-light: #f2f3f5;
            --border-gray: #e5e7eb;
            --success-bg: #e8ffea;
            
            /* Shadows */
            --shadow-standard: rgba(0, 0, 0, 0.08) 0px 4px 6px;
            --shadow-soft: rgba(0, 0, 0, 0.08) 0px 0px 22.576px;
            --shadow-brand: rgba(44, 30, 116, 0.16) 0px 0px 15px;
            --shadow-brand-offset: rgba(44, 30, 116, 0.11) 6.5px 2px 17.5px;
            --shadow-elevated: rgba(36, 36, 36, 0.08) 0px 12px 16px -4px;
            
            /* Typography */
            --font-ui: 'DM Sans', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-display: 'Outfit', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-mid: 'Poppins', sans-serif;
            --font-data: 'Roboto', 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            display: block;
            background: var(--bg-white);
            font-family: var(--font-ui);
            overflow: hidden;
            padding: 20px 20px 20px 0;
            padding-right: 340px;
            transition: padding-right 0.1s ease;
            color: var(--text-primary);
            line-height: 1.5;
            /* 防止字体加载时的布局偏移 */
            font-synthesis: none;
        }

        .main-content {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            justify-content: flex-start;
            flex-wrap: nowrap;
        }

        .canvas-container {
            margin-left: 0;
        }

        .container {
            position: relative;
        }

        canvas {
            background: #ffffff;
            cursor: grab;
            display: block;
            margin: auto;
            overflow: hidden;
        }

        .avtp-form {
            position: fixed;
            left: -320px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            max-height: 60vh;
            background: var(--bg-white);
            border-radius: 20px;
            box-shadow: var(--shadow-brand);
            padding: 0;
            transition: left 0.3s ease, width 0.3s ease;
            z-index: 2001;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .avtp-form.visible {
            left: 20px;
        }

        .avtp-form.wide {
            width: 450px;
            max-height: 70vh;
        }

        .avtp-form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-light);
            flex-shrink: 0;
            background: var(--bg-white);
            box-shadow: var(--shadow-soft);
        }

        .avtp-form-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .avtp-form-content::-webkit-scrollbar {
            display: none;
        }

        .avtp-form-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            font-family: var(--font-display);
        }

        .avtp-form-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-light);
            border-radius: 8px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-family: var(--font-ui);
        }

        .avtp-form-close:hover {
            background: var(--primary-200);
            color: var(--brand-blue);
        }

        .avtp-form-back {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-light);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-right: 8px;
            padding: 0;
        }

        .avtp-form-back img {
            width: 18px;
            height: 18px;
        }

        .avtp-form-back:hover {
            background: var(--primary-200);
        }

        .avtp-form-back.hidden {
            display: none;
        }

        .avtp-form-group {
            margin-bottom: 16px;
        }

        .avtp-components-list {
            margin-top: 8px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border-gray);
            border-radius: 12px;
            padding: 12px;
            background: var(--bg-light);
        }

        .avtp-components-list::-webkit-scrollbar {
            display: none;
        }

        .avtp-component-item {
            background: var(--bg-white);
            border: 1px solid var(--border-gray);
            border-radius: 10px;
            padding: 12px;
            margin: 8px 0;
            position: relative;
            box-shadow: var(--shadow-standard);
            transition: all 0.2s;
        }

        .avtp-component-item:hover {
            box-shadow: var(--shadow-elevated);
            transform: translateY(-1px);
        }

        .avtp-component-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0;
        }

        .avtp-component-title {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 14px;
            font-family: var(--font-ui);
        }

        /* Component type colors - 浅色更浅，深色更深 */
        .avtp-component-item.keyboard {
            background: #fdf2f0;
            border-color: #922b21;
        }

        .avtp-component-item.audio {
            background: #eaf2f8;
            border-color: #1a5276;
        }

        .avtp-component-item.video {
            background: #f5eef8;
            border-color: #6c3483;
        }

        .avtp-component-item.text {
            background: #eafaf1;
            border-color: #1e8449;
        }

        .avtp-component-item.image {
            background: #fef5e7;
            border-color: #9c640c;
        }

        /* Component title colors - 更深 */
        .avtp-component-item.keyboard .avtp-component-title {
            color: #7b241c;
        }

        .avtp-component-item.audio .avtp-component-title {
            color: #154360;
        }

        .avtp-component-item.video .avtp-component-title {
            color: #5b2c6f;
        }

        .avtp-component-item.text .avtp-component-title {
            color: #145a32;
        }

        .avtp-component-item.image .avtp-component-title {
            color: #7e5109;
        }

        /* Component remove button colors - 更深 */
        .avtp-component-item.keyboard .avtp-component-remove {
            filter: invert(18%) sepia(65%) saturate(2234%) hue-rotate(338deg) brightness(95%) contrast(96%);
        }

        .avtp-component-item.audio .avtp-component-remove {
            filter: invert(18%) sepia(65%) saturate(2234%) hue-rotate(180deg) brightness(95%) contrast(96%);
        }

        .avtp-component-item.video .avtp-component-remove {
            filter: invert(18%) sepia(65%) saturate(2234%) hue-rotate(270deg) brightness(95%) contrast(96%);
        }

        .avtp-component-item.text .avtp-component-remove {
            filter: invert(18%) sepia(65%) saturate(2234%) hue-rotate(100deg) brightness(95%) contrast(96%);
        }

        .avtp-component-item.image .avtp-component-remove {
            filter: invert(18%) sepia(65%) saturate(2234%) hue-rotate(30deg) brightness(95%) contrast(96%);
        }

        .avtp-component-remove {
            background: none;
            border: none;
            padding: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .avtp-component-remove img {
            width: 20px;
            height: 20px;
        }

        .avtp-add-buttons {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .avtp-add-btn {
            padding: 8px 14px;
            border: 1.5px solid var(--border-gray);
            border-radius: 9999px;
            background: var(--bg-white);
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
            font-family: var(--font-ui);
            font-weight: 500;
            color: var(--text-secondary);
        }

        .avtp-add-btn:hover {
            border-color: var(--brand-blue);
            background: var(--primary-200);
            color: var(--brand-blue);
        }

        .form-group-margin-top {
            margin-top: 16px;
        }

        .avtp-form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-family: var(--font-ui);
        }

        .avtp-form-input {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border-gray);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-ui);
            transition: all 0.2s;
            color: var(--text-primary);
            background: var(--bg-white);
        }

        .avtp-form-input:focus {
            outline: none;
            border-color: var(--brand-blue);
            box-shadow: 0 0 0 3px rgba(20, 86, 240, 0.1);
        }

        .avtp-form-input::placeholder {
            color: var(--text-muted);
        }

        .avtp-form-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .avtp-form-checkbox input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            cursor: pointer;
            vertical-align: middle;
            accent-color: var(--brand-blue);
        }

        .avtp-form-checkbox label {
            font-size: 14px;
            color: var(--text-dark);
            cursor: pointer;
            line-height: 1;
            vertical-align: middle;
            font-family: var(--font-ui);
            font-weight: 500;
        }

        .avtp-input-with-icon {
            position: relative;
            display: flex;
            align-items: center;
        }

        .avtp-input-with-icon .avtp-form-input {
            padding-right: 40px;
        }

        .avtp-keyboard-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666666;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .avtp-keyboard-btn:hover {
            color: #000000;
            background: #f0f0f0;
        }

        .avtp-keyboard-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .avtp-keyboard-modal.active {
            display: flex;
        }

        .confirm-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .confirm-modal.active {
            display: flex;
        }

        .confirm-modal-container {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-brand);
            max-width: 400px;
            width: 90%;
        }

        .confirm-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .confirm-modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-dark);
            font-family: var(--font-display);
        }

        .confirm-modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-light);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .confirm-modal-close:hover {
            background: var(--primary-200);
            color: var(--brand-blue);
        }

        .confirm-modal-message {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
            line-height: 1.6;
            font-family: var(--font-ui);
        }

        .confirm-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .confirm-modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-ui);
        }

        .confirm-modal-btn-cancel {
            background: var(--bg-white);
            border: 1.5px solid var(--border-gray);
            color: var(--text-dark);
        }

        .confirm-modal-btn-cancel:hover {
            background: var(--bg-light);
            border-color: var(--text-secondary);
        }

        .confirm-modal-btn-confirm {
            background: var(--text-charcoal);
            border: 1.5px solid var(--text-charcoal);
            color: var(--bg-white);
        }

        .confirm-modal-btn-confirm:hover {
            background: var(--brand-blue);
            border-color: var(--brand-blue);
        }

        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10001;
            justify-content: center;
            align-items: center;
        }

        .preview-modal.active {
            display: flex;
        }

        .preview-modal-container {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-brand);
            max-width: 800px;
            width: 90%;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
        }

        .preview-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .preview-modal-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            font-family: var(--font-display);
        }

        .preview-modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-light);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .preview-modal-close:hover {
            background: var(--primary-200);
            color: var(--brand-blue);
        }

        .preview-modal-content {
            flex: 1;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .preview-canvas-container {
            border: 1px solid var(--border-gray);
            border-radius: 12px;
            overflow: hidden;
            background: var(--bg-light);
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .preview-canvas {
            max-width: 100%;
            max-height: 400px;
        }

        .preview-info {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            font-family: var(--font-ui);
        }

        .preview-info ul {
            margin: 8px 0;
            padding-left: 20px;
        }

        .preview-info li {
            margin: 4px 0;
        }

        .preview-modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 20px;
            flex-shrink: 0;
        }

        .preview-modal-btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-ui);
        }

        .preview-modal-btn-cancel {
            background: var(--bg-white);
            border: 1.5px solid var(--border-gray);
            color: var(--text-dark);
        }

        .preview-modal-btn-cancel:hover {
            background: var(--bg-light);
            border-color: var(--text-secondary);
        }

        .preview-modal-btn-confirm {
            background: var(--text-charcoal);
            border: 1.5px solid var(--text-charcoal);
            color: var(--bg-white);
        }

        .preview-modal-btn-confirm:hover {
            background: var(--brand-blue);
            border-color: var(--brand-blue);
        }

        .avtp-keyboard-container {
            background: var(--bg-white);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow-brand);
            max-width: 900px;
            width: 95%;
            overflow-x: auto;
        }

        .avtp-keyboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .avtp-keyboard-title {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dark);
            font-family: var(--font-display);
        }

        .avtp-keyboard-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-light);
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: var(--text-secondary);
            transition: all 0.2s;
        }

        .avtp-keyboard-close:hover {
            background: var(--primary-200);
            color: var(--brand-blue);
        }

        .avtp-keyboard-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 16px;
        }

        .avtp-keyboard-row {
            display: flex;
            gap: 8px;
            justify-content: center;
        }

        .avtp-keyboard-key {
            padding: 12px 10px;
            min-width: 44px;
            border: 1.5px solid var(--border-gray);
            border-radius: 8px;
            background: var(--bg-white);
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-ui);
            color: var(--text-primary);
            transition: all 0.15s;
            text-align: center;
            font-weight: 500;
        }

        .avtp-keyboard-key:hover {
            border-color: var(--brand-blue);
            background: var(--primary-200);
        }

        .avtp-keyboard-key.selected {
            background: var(--brand-blue);
            color: var(--bg-white);
            border-color: var(--brand-blue);
        }

        .avtp-keyboard-key.wide {
            min-width: 80px;
        }

        .avtp-keyboard-key.space-key {
            min-width: 280px;
        }

        .avtp-keyboard-selected {
            margin-top: 20px;
            padding: 16px;
            background: var(--bg-light);
            border-radius: 12px;
        }

        .avtp-keyboard-selected-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-family: var(--font-ui);
            font-weight: 500;
        }

        .avtp-keyboard-selected-keys {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .avtp-keyboard-selected-key {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--brand-blue);
            color: var(--bg-white);
            border-radius: 9999px;
            font-size: 12px;
            font-family: var(--font-ui);
            font-weight: 500;
        }

        .avtp-keyboard-selected-key button {
            background: none;
            border: none;
            color: var(--bg-white);
            cursor: pointer;
            padding: 0;
            font-size: 14px;
            line-height: 1;
        }

        .avtp-keyboard-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }

        .avtp-keyboard-btn-secondary {
            padding: 10px 20px;
            border: 1.5px solid var(--border-gray);
            border-radius: 8px;
            background: var(--bg-white);
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-ui);
            color: var(--text-dark);
            transition: all 0.2s;
            font-weight: 600;
        }

        .avtp-keyboard-btn-secondary:hover {
            background: var(--bg-light);
            border-color: var(--text-secondary);
        }

        .avtp-keyboard-btn-primary {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--text-charcoal);
            cursor: pointer;
            font-size: 13px;
            font-family: var(--font-ui);
            color: var(--bg-white);
            transition: all 0.2s;
            font-weight: 600;
        }

        .avtp-keyboard-btn-primary:hover {
            background: var(--brand-blue);
        }

        .avtp-form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .avtp-form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1.5px solid var(--border-gray);
            border-radius: 8px;
            font-size: 14px;
            font-family: var(--font-ui);
            background: var(--bg-white);
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .avtp-form-select:focus {
            outline: none;

        /* Loop Conditions Table - Minimal Style */
        .loop-conditions-panel {
            background: transparent;
            border-radius: 0;
            overflow: visible;
        }

        .loop-conditions-header {
            padding: 0 0 12px 0;
            background: transparent;
            border-bottom: none;
        }

        .loop-conditions-title {
            font-size: 14px;
            font-weight: 600;
            color: #222222;
            font-family: var(--font-ui);
            letter-spacing: 0.2px;
        }

        .loop-conditions-content {
            padding: 0;
        }

        .loop-conditions-table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
            border: 1px solid #e5e7eb;
        }

        .loop-conditions-table thead {
            background: #f8f9fa;
        }

        .loop-conditions-table th {
            padding: 10px 12px;
            text-align: left;
            font-size: 13px;
            font-weight: 500;

            border-right: 1px solid #e5e7eb;
        }

        .loop-conditions-table th:last-child {
            border-right: none;
        }

        .loop-conditions-table th.cond-col-name {
            min-width: 140px;
        }

        .loop-conditions-table th.cond-col-var {
            min-width: 80px;
            text-align: center;
        }

        .loop-conditions-table th.cond-col-weight {
            width: 60px;
            text-align: center;
        }

        .loop-conditions-table th.cond-col-actions {
            width: 40px;
            text-align: center;

        .loop-conditions-table td {

            border-right: 1px solid #e5e7eb;

            vertical-align: middle;

        .loop-conditions-table td:last-child {
            border-right: none;
        }

        .loop-conditions-table tbody tr:hover {
            background: #fafafa;

        .loop-conditions-table tbody tr:last-child td {
            border-bottom: 1px solid #e5e7eb;
        }

        .loop-cond-name-input,
        .loop-cond-weight-input,
        .loop-cond-var-input {

            border-bottom: 1px solid transparent;
            border-radius: 0;
            font-size: 14px;
            font-family: var(--font-ui);
            font-weight: 400;
            color: var(--text-primary);
            background: transparent;
            transition: all 0.15s ease;
            box-sizing: border-box;
            cursor: text;

        .loop-cond-name-input:hover,
        .loop-cond-weight-input:hover,
        .loop-cond-var-input:hover {
            background: #fafafa;
        }

        .loop-cond-name-input:focus,
        .loop-cond-weight-input:focus,

        .loop-cond-name-input::placeholder,

        .loop-cond-weight-input,

        }

        .loop-cond-remove-btn {

            align-items: center;
            justify-content: center;
            border-radius: 0;
            transition: all 0.15s ease;

            color: #8e8e93;

            color: #c5c5c7;
            font-family: var(--font-ui);
            line-height: 1.5;

        .loop-conditions-add-btn {

            border: 1px solid #e5e7eb;
            background: transparent;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            color: #45515e;

            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-ui);

        .loop-conditions-add-btn:hover {
            border-color: var(--brand-blue);
            color: var(--brand-blue);
            background: transparent;

        .loop-contents-display {

            padding: 20px;

        .loop-contents-header {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .loop-contents-title {
            font-size: 14px;
            font-weight: 600;
            color: #45515e;
            font-family: var(--font-ui);
            letter-spacing: 0.2px;
        }

        .loop-contents-list {

            font-weight: 500;

        .loop-content-tag:hover {
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
            z-index: 2;
        }

        .loop-content-tag.routine {

            color: #1456f0;
            border: 1px solid rgba(20, 86, 240, 0.15);

        .loop-content-tag.routine:hover {
            background: rgba(20, 86, 240, 0.15);
            border-color: rgba(20, 86, 240, 0.25);
        }

        .loop-content-tag.loop {

            color: #ea5ec1;
            border: 1px solid rgba(234, 94, 193, 0.15);
            cursor: pointer;
        }

        .loop-content-tag.loop:hover {
            background: rgba(234, 94, 193, 0.2);
            border-color: rgba(234, 94, 193, 0.3);

        .loop-content-tag-icon {

            height: 12px;

            color: var(--text-muted);
            font-size: 13px;
            font-family: var(--font-ui);

            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .mode-btn {
            flex: 1;
            padding: 8px 16px;
            border: 1px solid var(--border-gray);
            background: var(--bg-white);
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-ui);
        }

        .mode-btn.active {
            background: var(--brand-blue);
            color: var(--bg-white);
            border-color: var(--brand-blue);
        }

        .mode-btn:hover:not(.active) {
            background: var(--bg-light);
            border-color: var(--text-secondary);
        }

        .form-group-visible {
            display: block;
        }

        .chatbot-panel {
            position: fixed;
            right: 0;
            top: 0;
            transform: none;
            width: 30%;
            min-width: 20%;
            max-width: 50%;
            background: var(--bg-white);
            border-radius: 0;
            overflow: hidden;
            height: 100vh;
            z-index: 1000;
            box-shadow: none;
        }

        .chatbot-resizer {
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 12px;
            cursor: ew-resize;
            z-index: 1002;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .chatbot-resizer::after {
            content: '';
            width: 4px;
            height: 60px;
            background: var(--border-gray);
            border-radius: 2px;
            transition: background 0.2s;
        }

        .chatbot-resizer:hover::after {
            background: var(--brand-blue);
        }

        #chatbotFrame {
            width: 100%;
            height: 100%;
            border: none;
        }

        .undo-button-container {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 2000;
            display: flex;
            gap: 6px;
        }

        .undo-button, .action-button {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 10px 16px;
            background: var(--bg-white);
            border: 1.5px solid var(--border-gray);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow-standard);
            font-family: var(--font-ui);
        }

        .undo-button:hover:not(:disabled), .action-button:hover {
            background: var(--primary-200);
            border-color: var(--brand-blue);
            color: var(--brand-blue);
            box-shadow: var(--shadow-elevated);
            transform: translateY(-1px);
        }

        .undo-button:active:not(:disabled), .action-button:active {
            background: var(--primary-200);
            transform: scale(0.98);
        }

        .undo-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--bg-light);
            border-color: var(--border-gray);
            box-shadow: none;
            color: var(--text-muted);
        }

        .undo-icon, .action-icon {
            font-size: 14px;
            font-weight: 600;
            line-height: 1;
            transition: transform 0.2s;
            color: currentColor;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .undo-icon svg, .action-icon svg {
            color: currentColor;
        }

        .undo-count {
            font-size: 13px;
            font-weight: 500;
            line-height: 1;
            min-width: 16px;
            text-align: center;
        }



        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(400px);
                opacity: 0;
            }
        }
    </style>

<div class="chatbot-panel" id="chatbotPanel">
    <div class="chatbot-resizer" id="chatbotResizer"></div>
    <iframe src="chatbot.html" title="Chatbot Panel" id="chatbotFrame"></iframe>
</div>

    <script src="json2psyexp.js"></script>
    <script>
        console.log('Script starting');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // 预加载图标
        const tapIcon = new Image();
        tapIcon.src = 'icon/tap.svg';
        let tapIconLoaded = false;
        tapIcon.onload = () => {
            tapIconLoaded = true;
        };

        const dpr = window.devicePixelRatio || 1;
        const baseHeight = 600;
        const baseStartX = 60;
        const baseEndX = 1060;
        const maxPoints = 9;
        const spacing = (baseEndX - baseStartX) / (maxPoints - 1);
        const minDisplayRoutines = 1;

        const chatbotPanel = document.getElementById('chatbotPanel');
        const chatbotResizer = document.getElementById('chatbotResizer');
        const chatbotFrame = document.getElementById('chatbotFrame');
        const routineControls = document.querySelector('.routine-controls');
        let isResizingChatbot = false;
        let startX = 0;
        let startWidth = 0;

        chatbotResizer.addEventListener('mousedown', (e) => {
            isResizingChatbot = true;
            startX = e.clientX;
            startWidth = chatbotPanel.offsetWidth;
            document.body.style.cursor = 'ew-resize';
            document.body.style.userSelect = 'none';
            // Disable pointer events on iframe to prevent it from capturing mouse events
            chatbotFrame.style.pointerEvents = 'none';
            e.stopPropagation();
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizingChatbot) return;
            
            const delta = startX - e.clientX;
            const containerWidth = window.innerWidth;
            const newWidth = startWidth + delta;
            
            const minWidth = containerWidth * 0.2;
            const maxWidth = containerWidth * 0.5;
            
            const clampedWidth = Math.max(minWidth, Math.min(maxWidth, newWidth));
            chatbotPanel.style.width = (clampedWidth / containerWidth * 100) + '%';
            
            // Update body padding to match chatbot panel width
            document.body.style.paddingRight = (clampedWidth + 20) + 'px';
        });

        document.addEventListener('mouseup', () => {
            isResizingChatbot = false;
            document.body.style.cursor = '';
            document.body.style.userSelect = '';
            // Re-enable pointer events on iframe
            chatbotFrame.style.pointerEvents = 'auto';
            
            // Persist the padding change
            const currentPadding = document.body.style.paddingRight;
            if (currentPadding) {
                document.body.style.paddingRight = currentPadding;
            }
        });

        // Initial padding setup
        const initialChatbotWidth = chatbotPanel.offsetWidth;
        document.body.style.paddingRight = (initialChatbotWidth + 20) + 'px';

        let isCanvasPanning = false;
        let canvasPanStartX = 0;
        let canvasPanStartY = 0;
        let canvasPanStartViewportX = 0;
        let canvasPanStartViewportY = 0;

        document.addEventListener('click', (e) => {
            if (!chatbotPanel.contains(e.target)) {
                chatbotFrame.contentWindow.postMessage('closeAdvancedSettings', '*');
            }
        });
         
        function calculateCanvasWidth(routineCount) {
            const displayCount = Math.max(routineCount, minDisplayRoutines);
            const totalPoints = displayCount * 2 + 1;
            const contentWidth = baseStartX + (totalPoints - 1) * spacing + 80;
            return Math.max(800, contentWidth);
        }

        function getFlowchartCenter() {
            if (routineRects.length === 0) {
                // 如果没有 routine，返回初始 flowchart 的中心点
                // 初始 flowchart 有 3 个点（minDisplayRoutines=1），中心在第二个点
                return { x: baseStartX + spacing, y: lineY };
            }
            
            // 如果有选中的 routine，以选中的 routine 为中心
            if (selectedRoutineIndex >= 0 && selectedRoutineIndex < routineRects.length) {
                const selectedRect = routineRects[selectedRoutineIndex];
                return {
                    x: selectedRect.x + selectedRect.width / 2,
                    y: selectedRect.y + selectedRect.height / 2
                };
            }
            
            // 如果没有选中的 routine，以第一个 routine 为中心
            const firstRect = routineRects[0];
            return {
                x: firstRect.x + firstRect.width / 2,
                y: firstRect.y + firstRect.height / 2
            };
        }
        
        // 显示通知消息
        function showNotification(message, duration = 3000) {
            // 创建通知元素
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: #4CAF50;
                color: white;
                padding: 12px 24px;
                border-radius: 4px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.2);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            // 自动消失
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, duration);
        }
        
        let currentRoutineCount = 0;
        let canvasWidth = calculateCanvasWidth(currentRoutineCount);

        let viewportX = 0;
        let viewportY = 0;
        let scale = 1;
        const minScale = 0.25;
        const maxScale = 3;
        let isPanning = false;
        let panStartX = 0;
        let panStartY = 0;
        let lastPanX = 0;
        let lastPanY = 0;
        let panStartViewportX = 0;
        let panStartViewportY = 0;

        const backwardButton = document.getElementById('backwardButton');
        const forwardButton = document.getElementById('forwardButton');
        const zoomInButton = document.getElementById('zoomIn');
        const zoomOutButton = document.getElementById('zoomOut');
        const resetViewButton = document.getElementById('resetView');
        const zoomLevelDisplay = document.getElementById('zoomLevel');
        const maxHistoryLength = 15;
        const historyStack = [];
        const redoStack = [];

        function updateZoomLevelDisplay() {
            zoomLevelDisplay.textContent = Math.round(scale * 100) + '%';
        }

        function zoomIn() {
            // 计算排除 chatbot 后的画布中心
            const chatbotWidth = chatbotPanel.offsetWidth;
            const canvasCenterX = (window.innerWidth - chatbotWidth) / 2;
            const canvasCenterY = window.innerHeight / 2;
            
            const newScale = Math.min(maxScale, scale * 1.2);
            
            // 获取 flowchart 内容的中心点
            const flowchartCenter = getFlowchartCenter();
            
            // 将 flowchart 中心点置于画布中心（排除 chatbot）
            viewportX = canvasCenterX / newScale - flowchartCenter.x;
            viewportY = canvasCenterY / newScale - flowchartCenter.y;
            scale = newScale;

            draw();
            updateZoomLevelDisplay();
        }

        function zoomOut() {
            // 计算排除 chatbot 后的画布中心
            const chatbotWidth = chatbotPanel.offsetWidth;
            const canvasCenterX = (window.innerWidth - chatbotWidth) / 2;
            const canvasCenterY = window.innerHeight / 2;
            
            const newScale = Math.max(minScale, scale * 0.8);
            
            // 获取 flowchart 内容的中心点
            const flowchartCenter = getFlowchartCenter();

        // 根据 AVTP 组件数量动态计算 routine 块的高度
        function calculateRoutineHeight(rect) {
            const padding = 16;
            const timelineLineHeight = 28;
            const headerHeight = 50;
            const minHeight = 140;
            const extraPadding = 24;
            
            let requiredHeight = padding + headerHeight + extraPadding;
            
            const avtpComponents = rect.avtpComponents || [];
            const enabledComponents = avtpComponents.filter(c => c && c.enabled);
            
            // 所有 AVTPK 组件都使用 timeline 样式显示，统一使用 timelineLineHeight
            const allAvtpkComponents = enabledComponents.filter(c => 
                ['keyboard', 'audio', 'video', 'text', 'image'].includes(c.type)
            );
            if (allAvtpkComponents.length > 0) {
                requiredHeight += allAvtpkComponents.length * timelineLineHeight;
            }
            
            return Math.max(minHeight, requiredHeight);
        }
        
        // 更新 routine 块的高度
        function updateRoutineHeight(rect) {
            rect.height = calculateRoutineHeight(rect);

        function getMaxDepthForSameEndpoints(conn, allConnections) {
            const startLabel = conn.start.label;
            const endLabel = conn.end.label;
            let maxDepth = -1;

            for (const other of allConnections) {
                if (other === conn) continue;
                const isSameEndpoints = (other.start.label === startLabel && other.end.label === endLabel) ||
                                        (other.start.label === endLabel && other.end.label === startLabel);
                if (isSameEndpoints) {
                    maxDepth = Math.max(maxDepth, other.depth);
                }
            }

            return maxDepth;
        }

        function getNestingDepth(conn, allConnections) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const connMin = Math.min(startLabel, endLabel);
            const connMax = Math.max(startLabel, endLabel);
            
            let maxContainedDepth = -1;
            
            for (const other of allConnections) {
                if (other === conn) continue;
                const otherStartLabel = parseInt(other.start.label);
                const otherEndLabel = parseInt(other.end.label);
                const otherMin = Math.min(otherStartLabel, otherEndLabel);
                const otherMax = Math.max(otherStartLabel, otherEndLabel);
                
                if (connMin <= otherMin && connMax >= otherMax) {
                    if (connMin === otherMin && connMax === otherMax) {
                        const connIndex = allConnections.indexOf(conn);
                        const otherIndex = allConnections.indexOf(other);
                        if (connIndex > otherIndex) {
                            maxContainedDepth = Math.max(maxContainedDepth, other.depth);
                        }
                    } else {
                        maxContainedDepth = Math.max(maxContainedDepth, other.depth);
                    }
                }
            }
            
            return maxContainedDepth + 1;
        }

        function rebuildAllConnectionDepths() {
            if (connections.length === 0) return;
            
            let changed = true;
            let iterations = 0;
            const maxIterations = connections.length + 1;
            
            while (changed && iterations < maxIterations) {
                changed = false;
                iterations++;
                
                for (const conn of connections) {
                    const oldDepth = conn.depth;
                    const newDepth = getNestingDepth(conn, connections);
                    
                    if (newDepth !== oldDepth) {
                        conn.depth = newDepth;
                        changed = true;
                    }
                }
            }
        }
        
        function rebuildAllConnectionDepthsForPreview(allConnections, previewConn) {
            if (allConnections.length === 0) return;
            
            let changed = true;
            let iterations = 0;
            const maxIterations = allConnections.length + 1;
            
            while (changed && iterations < maxIterations) {
                changed = false;
                iterations++;
                
                for (const conn of allConnections) {
                    const oldDepth = conn.depth;
                    const newDepth = getNestingDepthForPreview(conn, allConnections);
                    
                    if (newDepth !== oldDepth) {
                        conn.depth = newDepth;
                        changed = true;
                    }
                }
            }
        }
        
        function getNestingDepthForPreview(conn, allConnections) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const connMin = Math.min(startLabel, endLabel);
            const connMax = Math.max(startLabel, endLabel);
            
            let maxContainedDepth = -1;
            
            for (const other of allConnections) {
                if (other === conn) continue;
                const otherStartLabel = parseInt(other.start.label);
                const otherEndLabel = parseInt(other.end.label);
                const otherMin = Math.min(otherStartLabel, otherEndLabel);

                if (connMin <= otherMin && connMax >= otherMax) {

                        }
                    } else {

                    }
                }
            }
            
            return maxContainedDepth + 1;
        }
        
        function getConnectionOffsetY(conn, allConnections) {
            return baseOffsetY + conn.depth * offsetYStep;
        }

        function getFollowRectPosition(conn) {
            const offsetY = getConnectionOffsetY(conn, connections);
            const cornerY = conn.start.y + offsetY;
            const middleX = (conn.start.x + conn.end.x) / 2;
            
            return {

        // Get all follow rectangle positions for all connections
        function getAllFollowRectPositions() {

        function isOverlapping(conn, allConnections) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const connMin = Math.min(startLabel, endLabel);
            const connMax = Math.max(startLabel, endLabel);
            for (const other of allConnections) {
                const otherStartLabel = parseInt(other.start.label);
                const otherEndLabel = parseInt(other.end.label);
                const otherMin = Math.min(otherStartLabel, otherEndLabel);
                const otherMax = Math.max(otherStartLabel, otherEndLabel);
                const isSame = connMin === otherMin && connMax === otherMax;
                const sharesEndpoint = (startLabel === otherStartLabel || startLabel === otherEndLabel ||
                                       endLabel === otherStartLabel || endLabel === otherEndLabel);
                const isContained = (otherMin <= connMin && otherMax >= connMax) ||
                                   (connMin <= otherMin && connMax >= otherMax);
                const isSeparate = connMax < otherMin || connMin > otherMax;
                if (isSame || sharesEndpoint || isContained || isSeparate) {
                    continue;
                }
                return true;
            }
            return false;
        }

        function drawRoundedRect(x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
        }

        function drawPreviewLine() {
            // 处理端点拖拽的预览
            if (isDraggingConnectionEndpoint && draggedConnection) {
                const targetPoint = nearestValidPoint || { x: currentMousePos.x, y: currentMousePos.y };
                
                // 构建预览连接
                const previewConn = { 
                    start: draggedEndpoint === 'start' ? targetPoint : draggedConnection.start, 
                    end: draggedEndpoint === 'end' ? targetPoint : draggedConnection.end, 
                    depth: 0,
                    loopName: 'preview'
                };
                
                // 过滤掉正在拖拽的连接，添加预览连接
                const otherConns = connections.filter(c => c !== draggedConnection);
                const allConnsForPreview = [...otherConns, previewConn];
                
                rebuildAllConnectionDepths();
                const allConnsWithRebuiltDepth = [...otherConns, previewConn];
                rebuildAllConnectionDepthsForPreview(allConnsWithRebuiltDepth, previewConn);
                
                const offsetY = getConnectionOffsetY(previewConn, allConnsForPreview);
                const cornerRadius = 15; // 圆角半径

                const startX = previewConn.start.x;
                const startY = previewConn.start.y;
                const endX = previewConn.end.x;
                const endY = previewConn.end.y;
                const cornerY = startY + offsetY;

                // 判断方向：从左到右还是从右到左
                const isLeftToRight = startX < endX;
                const leftX = isLeftToRight ? startX : endX;
                const rightX = isLeftToRight ? endX : startX;

                ctx.beginPath();

                // 从起点开始
                ctx.moveTo(startX, startY);

                if (isLeftToRight) {
                    // 从左到右：起点在左，终点在右
                    // 左侧垂直线（到第一个圆角开始处）
                    ctx.lineTo(startX, cornerY + cornerRadius);
                    // 左下角圆弧（从垂直过渡到水平）
                    ctx.arcTo(startX, cornerY, startX + cornerRadius, cornerY, cornerRadius);
                    // 顶部水平线（到第二个圆角开始处）
                    ctx.lineTo(endX - cornerRadius, cornerY);
                    // 右下角圆弧（从水平过渡到垂直）
                    ctx.arcTo(endX, cornerY, endX, cornerY + cornerRadius, cornerRadius);
                    // 右侧垂直线到终点
                    ctx.lineTo(endX, endY);
                } else {
                    // 从右到左：起点在右，终点在左
                    // 右侧垂直线（到第一个圆角开始处）
                    ctx.lineTo(startX, cornerY + cornerRadius);
                    // 右下角圆弧（从垂直过渡到水平）
                    ctx.arcTo(startX, cornerY, startX - cornerRadius, cornerY, cornerRadius);
                    // 顶部水平线（到第二个圆角开始处）
                    ctx.lineTo(endX + cornerRadius, cornerY);
                    // 左下角圆弧（从水平过渡到垂直）
                    ctx.arcTo(endX, cornerY, endX, cornerY + cornerRadius, cornerRadius);
                    // 左侧垂直线到终点
                    ctx.lineTo(endX, endY);
                }

                ctx.stroke();
                const middleX = (previewConn.start.x + previewConn.end.x) / 2;
                const previewLoopName = draggedConnection.loopName || 'trials';
                ctx.font = '500 14px DM Sans, Outfit, sans-serif';
                const previewTextWidth = ctx.measureText(previewLoopName).width;
                const followRectWidth = Math.max(60, previewTextWidth + 24);
                const followRectHeight = 30;
                const followRectRadius = 8;

                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1.5;
                drawRoundedRect(middleX - followRectWidth / 2, cornerY - followRectHeight / 2, followRectWidth, followRectHeight, followRectRadius);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#222222';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(previewLoopName, middleX, cornerY);

                ctx.setLineDash([]);
                return;
            }

            // 处理新建连线的预览
            if (isDraggingLine && startPoint) {
                const targetPoint = nearestValidPoint || { x: currentMousePos.x, y: currentMousePos.y };
                
                const newStartLabel = parseInt(startPoint.label);
                const newEndLabel = parseInt(targetPoint.label);
                const newMin = Math.min(newStartLabel, newEndLabel);
                const newMax = Math.max(newStartLabel, newEndLabel);

                const previewConn = { 
                    start: startPoint, 
                    end: targetPoint, 
                    depth: 0,
                    loopName: 'preview'
                };

                rebuildAllConnectionDepths();
                const allConnsWithRebuiltDepth = [...connections, previewConn];
                rebuildAllConnectionDepthsForPreview(allConnsWithRebuiltDepth, previewConn);
                
                const offsetY = getConnectionOffsetY(previewConn, allConnsForPreview);
                const cornerRadius = 15; // 圆角半径

                const startX = startPoint.x;
                const startY = startPoint.y;
                const endX = targetPoint.x;
                const endY = targetPoint.y;
                const cornerY = startY + offsetY;

                // 判断方向：从左到右还是从右到左
                const isLeftToRight = startX < endX;

                ctx.beginPath();

                // 从起点开始
                ctx.moveTo(startX, startY);

                if (isLeftToRight) {
                    // 从左到右：起点在左，终点在右
                    // 左侧垂直线（到第一个圆角开始处）
                    ctx.lineTo(startX, cornerY + cornerRadius);
                    // 左下角圆弧（从垂直过渡到水平）
                    ctx.arcTo(startX, cornerY, startX + cornerRadius, cornerY, cornerRadius);
                    // 顶部水平线（到第二个圆角开始处）
                    ctx.lineTo(endX - cornerRadius, cornerY);
                    // 右下角圆弧（从水平过渡到垂直）
                    ctx.arcTo(endX, cornerY, endX, cornerY + cornerRadius, cornerRadius);
                    // 右侧垂直线到终点
                    ctx.lineTo(endX, endY);
                } else {
                    // 从右到左：起点在右，终点在左
                    // 右侧垂直线（到第一个圆角开始处）
                    ctx.lineTo(startX, cornerY + cornerRadius);
                    // 右下角圆弧（从垂直过渡到水平）
                    ctx.arcTo(startX, cornerY, startX - cornerRadius, cornerY, cornerRadius);
                    // 顶部水平线（到第二个圆角开始处）
                    ctx.lineTo(endX + cornerRadius, cornerY);
                    // 左下角圆弧（从水平过渡到垂直）
                    ctx.arcTo(endX, cornerY, endX, cornerY + cornerRadius, cornerRadius);
                    // 左侧垂直线到终点
                    ctx.lineTo(endX, endY);
                }

                ctx.stroke();
                const middleX = (startPoint.x + targetPoint.x) / 2;
                const newLoopName = previewConn.loopName || 'trials';
                ctx.font = '500 14px DM Sans, Outfit, sans-serif';
                const newTextWidth = ctx.measureText(newLoopName).width;
                const followRectWidth = Math.max(60, newTextWidth + 24);

                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.strokeStyle = '#000000';
