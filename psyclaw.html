                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = '#222222';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(newLoopName, middleX, cornerY);

                ctx.setLineDash([]);
            }
        }

        // 获取 loop 包含的所有 routine 名称
        function getLoopRoutines(conn) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const minLabel = Math.min(startLabel, endLabel);
            const maxLabel = Math.max(startLabel, endLabel);

            const routines = [];
            for (let i = 0; i < routineRects.length; i++) {
                const rect = routineRects[i];
                if (!rect) continue;
                // routine i 占据的连接点范围：[i * 2 + 1, i * 2 + 3]
                const routineLeftLabel = i * 2 + 1;
                const routineRightLabel = i * 2 + 3;
                // 如果 routine 在 loop 范围内
                if (routineLeftLabel >= minLabel && routineRightLabel <= maxLabel) {
                    routines.push(rect.name || `Routine ${i + 1}`);
                }
            }
            return routines;
        }
        
        // 获取 loop 包含的所有 routines 和 nested loops
        function getLoopContents(conn, allConnections) {
            const startLabel = parseInt(conn.start.label);
            const endLabel = parseInt(conn.end.label);
            const minLabel = Math.min(startLabel, endLabel);
            const maxLabel = Math.max(startLabel, endLabel);
            const connDepth = conn.depth || 0;

            const routines = [];
            const loops = [];
            
            // 获取包含的 routines
            for (let i = 0; i < routineRects.length; i++) {
                const rect = routineRects[i];
                if (!rect) continue;
                const routineLeftLabel = i * 2 + 1;
                const routineRightLabel = i * 2 + 3;
                if (routineLeftLabel >= minLabel && routineRightLabel <= maxLabel) {
                    routines.push({ name: rect.name || `Routine ${i + 1}`, type: 'routine', index: i });
                }
            }
            
            // 获取直接嵌套的 loops（需要满足：1. 在范围内 2. depth = connDepth - 1）
            for (let i = 0; i < allConnections.length; i++) {
                const otherConn = allConnections[i];
                if (otherConn === conn) continue;
                
                const otherStartLabel = parseInt(otherConn.start.label);
                const otherEndLabel = parseInt(otherConn.end.label);
                const otherMinLabel = Math.min(otherStartLabel, otherEndLabel);
                const otherMaxLabel = Math.max(otherStartLabel, otherEndLabel);
                const otherDepth = otherConn.depth || 0;
                
                // 检查这个 loop 是否完全在当前 loop 范围内，且是直接子级（depth = connDepth - 1）
                // 注意：depth 越大表示越外层（包含更多内容），所以被包含的 loop 有更小的 depth
                if (otherMinLabel >= minLabel && otherMaxLabel <= maxLabel && otherDepth === connDepth - 1) {
                    loops.push({ name: otherConn.loopName || `Loop ${i + 1}`, type: 'loop', index: i });
                }
            }
            
            return { routines, loops };
        }
        
        function updateLoopContentsDisplay(conn) {
            const loopContentsList = document.getElementById('loopContentsList');
            if (!loopContentsList) return;
            
            const contents = getLoopContents(conn, connections);
            
            let html = '';
            
            // Add routine tags
            contents.routines.forEach((routine, index) => {
                html += `
                    <span class="loop-content-tag routine" data-routine-index="${index}" data-routine-name="${routine.name}" style="cursor: pointer;">
                        <svg class="loop-content-tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <path d="M9 9h6v6H9z"/>
                        </svg>
                        ${routine.name}
                    </span>
                `;
            });
            
            // Add nested loop tags
            contents.loops.forEach((loop, index) => {
                html += `
                    <span class="loop-content-tag loop" data-loop-index="${index}" data-loop-name="${loop.name}" style="cursor: pointer;">
                        <svg class="loop-content-tag-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 2l4 4-4 4"/>
                            <path d="M3 11v-1a4 4 0 014-4h14"/>
                            <path d="M7 22l-4-4 4-4"/>
                            <path d="M21 13v1a4 4 0 01-4 4H3"/>
                        </svg>
                        ${loop.name}
                    </span>
                `;
            });
            
            if (html === '') {
                html = '<span style="color: var(--text-muted); font-size: 11px;">No routines or loops</span>';
            }
            
            loopContentsList.innerHTML = html;
            
            // Add click event listeners to routine tags
            loopContentsList.querySelectorAll('.loop-content-tag.routine').forEach(tag => {
                tag.addEventListener('click', () => {
                    const routineName = tag.dataset.routineName;
                    // Find the routine rect by name
                    const routineRect = routineRects.find(r => r.name === routineName);
                    if (routineRect) {
                        // Close the loop form and show the routine form
                        hideLoopForm();
                        showRoutineForm(routineRect);
                    }
                });
            });
            
            // Add click event listeners to loop tags
            loopContentsList.querySelectorAll('.loop-content-tag.loop').forEach(tag => {
                tag.addEventListener('click', () => {
                    const loopName = tag.dataset.loopName;
                    // Find the connection by loop name
                    const connection = connections.find(c => c.loopName === loopName);
                    if (connection) {
                        // Close current form and show the loop form
                        hideRoutineForm();
                        showLoopForm(connection);
                    }
                });
            });
        }

        function drawConnectionLines() {
            let previewConn = null;
            let allConns = connections;
            
            if (isDraggingLine && startPoint && nearestValidPoint) {
                previewConn = { 
                    start: startPoint, 
                    end: nearestValidPoint, 
                    depth: 0,
                    loopName: 'preview'
                };
                const allConnsWithPreview = [...connections, previewConn];
                rebuildAllConnectionDepthsForPreview(allConnsWithPreview, previewConn);
                allConns = allConnsWithPreview;
            }

            const sortedConnections = [...connections].sort((a, b) => {
                // 被选中的 loop 放在最上方（最后绘制）
                const aSelected = activeConnection === a ? 1 : 0;
                const bSelected = activeConnection === b ? 1 : 0;
                if (aSelected !== bSelected) {
                    return aSelected - bSelected;
                }
                return a.depth - b.depth;
            });

            sortedConnections.forEach(conn => {
                // 端点拖拽时，隐藏正在拖拽的原始连线（预览线会显示）
                if (isDraggingConnectionEndpoint && draggedConnection === conn) {
                    return;
                }
                
                const isSelected = activeConnection === conn;
                const isPreview = conn.loopName === 'preview';

                // 选中状态的样式 - 只改变颜色，不加粗
                if (isSelected && !isPreview) {
                    ctx.strokeStyle = '#0066cc';
                    ctx.lineWidth = 1.5;
                } else {
                    ctx.strokeStyle = '#808080';
                    ctx.lineWidth = 1.5;
                }
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.setLineDash([]);

                const offsetY = getConnectionOffsetY(conn, allConns);
                const cornerRadius = 15; // 圆角半径

                // 计算四个转角点
                const startX = conn.start.x;
                const startY = conn.start.y;
                const endX = conn.end.x;
                const endY = conn.end.y;
                const cornerY = startY + offsetY;

                // 判断方向：从左到右还是从右到左
                const isLeftToRight = startX < endX;

                ctx.beginPath();

                // 从起点开始
                ctx.moveTo(startX, startY);

                if (isLeftToRight) {
                    // 从左到右：起点在左，终点在右
                    // 左侧垂直线（到第一个圆角开始处）
                    ctx.lineTo(startX, cornerY + cornerRadius);
                    // 左下角圆弧（从垂直过渡到水平）
                    ctx.arcTo(startX, cornerY, startX + cornerRadius, cornerY, cornerRadius);
                    // 顶部水平线（到第二个圆角开始处）
                    ctx.lineTo(endX - cornerRadius, cornerY);
                    // 右下角圆弧（从水平过渡到垂直）
                    ctx.arcTo(endX, cornerY, endX, cornerY + cornerRadius, cornerRadius);
                    // 右侧垂直线到终点
                    ctx.lineTo(endX, endY);
                } else {
                    // 从右到左：起点在右，终点在左
                    // 右侧垂直线（到第一个圆角开始处）
                    ctx.lineTo(startX, cornerY + cornerRadius);
                    // 右下角圆弧（从垂直过渡到水平）
                    ctx.arcTo(startX, cornerY, startX - cornerRadius, cornerY, cornerRadius);
                    // 顶部水平线（到第二个圆角开始处）
                    ctx.lineTo(endX + cornerRadius, cornerY);
                    // 左下角圆弧（从水平过渡到垂直）
                    ctx.arcTo(endX, cornerY, endX, cornerY + cornerRadius, cornerRadius);
                    // 左侧垂直线到终点
                    ctx.lineTo(endX, endY);
                }

                ctx.stroke();

                const middleX = (conn.start.x + conn.end.x) / 2;
                const loopName = conn.loopName || 'trials';
                ctx.font = '600 14px DM Sans, Outfit, sans-serif';
                // 根据文字宽度计算矩形宽度，最小60，两边各留12px边距
                const textWidth = ctx.measureText(loopName).width;
                const followRectWidth = Math.max(60, textWidth + 24);
                const followRectHeight = 30;
                const followRectRadius = 8;

                // 选中状态的 block 样式
                if (isSelected && !isPreview) {
                    ctx.fillStyle = '#e6f2ff';
                    ctx.strokeStyle = '#0066cc';
                    ctx.lineWidth = 2;
                } else {
                    ctx.fillStyle = '#ffffff';
                    ctx.strokeStyle = '#808080';
                    ctx.lineWidth = 1.5;
                }
                drawRoundedRect(middleX - followRectWidth / 2, cornerY - followRectHeight / 2, followRectWidth, followRectHeight, followRectRadius);
                ctx.fill();
                ctx.stroke();

                ctx.fillStyle = isSelected && !isPreview ? '#1456f0' : '#8e8e93';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // 在矩形中垂直居中
                ctx.fillText(loopName, middleX, cornerY);

                // 绘制 loop 包含的 routines 和 nested loops label
                if (!isPreview) {
                    const loopContents = getLoopContents(conn, allConns);
                    const allItems = [
                        ...loopContents.routines.map(r => r.name),
                        ...loopContents.loops.map(l => l.name)
                    ];
                    if (allItems.length > 0) {
                        ctx.fillStyle = isSelected ? '#1456f0' : '#45515e';
                        ctx.font = '12px DM Sans, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'bottom';
                        
                        // 构建显示文本：routine1, routine2, loop1, ...
                        let labelText = allItems.join(', ');
                        const maxWidth = Math.abs(endX - startX) - 20; // 最大宽度为 loop 宽度减去边距
                        
                        // 如果文本太长，截断并添加省略号
                        let displayText = labelText;
                        while (ctx.measureText(displayText + '...').width > maxWidth && displayText.length > 0) {
                            displayText = displayText.slice(0, -1);
                        }
                        if (displayText !== labelText) {
                            displayText = displayText + '...';
                        }
                        
                        // 在 loop 上方绘制
                        ctx.fillText(displayText, middleX, cornerY - followRectHeight / 2 - 5);
                    }
                }
            });
        }

        function draw() {
            ctx.save();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            ctx.save();
            ctx.translate(viewportX * scale, viewportY * scale);
            ctx.scale(scale, scale);

            ctx.strokeStyle = 'rgba(0, 0, 0, 0.12)';
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(flowStartX, lineY);
            ctx.lineTo(flowEndX, lineY);
            ctx.stroke();

            drawConnectionLines();
            drawPreviewLine();

            linePoints.forEach(point => {
                const isStart = startPoint && point.label === startPoint.label;
                const isConnected = connections.some(c => c.start.label === point.label || c.end.label === point.label);
                const isNearest = nearestValidPoint && point.label === nearestValidPoint.label;
                // 检查是否是被拖拽的loop连线的被抓取端点（只高亮被抓取的那个点）
                const isDraggedEndpoint = isDraggingConnectionEndpoint && draggedConnection && 
                    ((draggedEndpoint === 'start' && draggedConnection.start.label === point.label) ||
                     (draggedEndpoint === 'end' && draggedConnection.end.label === point.label));
                // 检查是否是该loop的另一个端点（保持实心）
                const isOtherEndpoint = isDraggingConnectionEndpoint && draggedConnection && 
                    ((draggedEndpoint === 'start' && draggedConnection.end.label === point.label) ||
                     (draggedEndpoint === 'end' && draggedConnection.start.label === point.label));

                let radius = 4;
                let fillColor = '#ffffff';
                let strokeColor = '#000000';

                if (isDraggedEndpoint) {
                    // 被抓取的loop连线端点 - 空心显示（被编辑状态）
                    radius = 6;
                    fillColor = '#ffffff';
                    strokeColor = '#0066cc';
                } else if (isOtherEndpoint) {
                    // loop的另一个端点 - 保持实心但用蓝色边框表示关联
                    radius = 5;
                    fillColor = '#000000';
                    strokeColor = '#0066cc';
                } else if (isConnected) {
                    radius = 5;
                    fillColor = '#000000';
                    strokeColor = '#000000';
                } else if (isStart && isDraggingLine) {
                    radius = 5;
                    fillColor = '#000000';
                    strokeColor = '#000000';
                } else if (isNearest && isDraggingLine) {
                    radius = 5;
                    fillColor = '#ffffff';
                    strokeColor = '#000000';
                }

                ctx.beginPath();
                ctx.arc(point.x, point.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = fillColor;
                ctx.fill();
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = isDraggedEndpoint ? 2 : 1.5;
                ctx.stroke();
            });

            // 先绘制所有非拖拽的 routine
            routineRects.forEach((rect, index) => {
                if (rect && rect !== activeDragRect) {
                    drawDragRect(rect, index);
                }
            });
            
            // 最后绘制正在拖拽的 routine（在最上层）
            if (activeDragRect) {
                const draggedIndex = routineRects.indexOf(activeDragRect);
                drawDragRect(activeDragRect, draggedIndex);
            }

            ctx.restore();
        }

        function drawDragRect(dragRect, index) {
            const isSelected = index === selectedRoutineIndex;
            
            if (isSelected) {
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#0066cc';
                ctx.lineWidth = 2.5;
            } else {
                ctx.fillStyle = '#ffffff';
                ctx.strokeStyle = '#000000';
                ctx.lineWidth = 1;
            }
            
            drawRoundedRect(dragRect.x, dragRect.y, dragRect.width, dragRect.height, dragRect.borderRadius);
            ctx.fill();

            const avtpComponents = dragRect.avtpComponents || [];
            const enabledComponents = avtpComponents.filter(c => c && c.enabled);
            
            const padding = 16;
            const lineHeight = 14;
            const timelineLineHeight = 28;
            const headerHeight = 50;
            const extraPadding = 24;
            
            ctx.fillStyle = isSelected ? '#1456f0' : '#222222';
            ctx.font = '600 16px DM Sans, Outfit, sans-serif';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(dragRect.name, dragRect.x + padding, dragRect.y + padding + 12);
            
            let currentY = dragRect.y + padding + headerHeight;
            
            // 清空组件点击区域
            dragRect.componentHitAreas = [];
            
            // 所有 AVTPK 组件使用统一的 timeline 样式显示
            const allAvtpkComponents = enabledComponents.filter(c => ['keyboard', 'audio', 'video', 'text', 'image'].includes(c.type));
            
            if (allAvtpkComponents.length > 0) {
                const maxDuration = Math.max(
                    ...allAvtpkComponents.map(c => {
                        const startTime = c.startTime || 0;
                        const duration = c.duration || 0;
                        return startTime + (duration > 0 ? duration : 3);
                    }),
                    3
                );
                
                const letterWidth = 16;
                const letterGap = 4;
                const timelineWidth = dragRect.width - padding * 2 - letterWidth - letterGap;
                const timelineStartX = dragRect.x + padding + letterWidth + letterGap;
                
                const typeToKey = {
                    'keyboard': 'k',
                    'audio': 'a',
                    'video': 'v',
                    'text': 't',
                    'image': 'p'
                };
                
                const typeColors = {
                    'keyboard': '#e74c3c',
                    'audio': '#3498db',
                    'video': '#9b59b6',
                    'text': '#2ecc71',
                    'image': '#f39c12'
                };
                
                // 浅色版本的颜色（用于无限 duration）
                const typeColorsLight = {
                    'keyboard': '#fadbd8',
                    'audio': '#d6eaf8',
                    'video': '#e8daef',
                    'text': '#d5f5e3',
                    'image': '#fdebd0'
                };
                
                allAvtpkComponents.forEach((comp, compIndex) => {
                    const typeKey = typeToKey[comp.type];
                    if (!typeKey) return;
                    
                    const startTime = comp.startTime || 0;
                    const isInfinite = comp.duration === -1;
                    const duration = isInfinite ? maxDuration : (comp.duration > 0 ? comp.duration : 3);
                    
                    const startX = timelineStartX + (startTime / maxDuration) * timelineWidth;
                    const barWidth = (duration / maxDuration) * timelineWidth;
                    
                    // 绘制背景 timeline
                    ctx.fillStyle = '#ecf0f1';
                    ctx.fillRect(timelineStartX, currentY - 5, timelineWidth, 10);
                    
                    // 绘制组件颜色条
                    if (isInfinite) {
                        // 无限 duration：使用浅色填充 + 边框
                        ctx.fillStyle = typeColorsLight[comp.type];
                        ctx.fillRect(startX, currentY - 5, Math.max(barWidth, 4), 10);
                        // 绘制边框
                        ctx.strokeStyle = typeColors[comp.type];
                        ctx.lineWidth = 2;
                        ctx.strokeRect(startX, currentY - 5, Math.max(barWidth, 4), 10);
                    } else {
                        // 有限 duration：使用正常颜色填充
                        ctx.fillStyle = typeColors[comp.type];
                        ctx.fillRect(startX, currentY - 5, Math.max(barWidth, 4), 10);
                    }
                    
                    // 绘制类型字母
                    ctx.font = '600 16px DM Sans, Outfit, sans-serif';
                    ctx.fillStyle = typeColors[comp.type];
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    // 微调偏移量，使字母与时间条垂直中心对齐
                    ctx.fillText(typeKey.toUpperCase(), dragRect.x + padding, currentY + 1);
                    ctx.textBaseline = 'alphabetic';
                    
                    // 存储组件绘制区域信息用于点击检测
                    if (!dragRect.componentHitAreas) dragRect.componentHitAreas = [];
                    dragRect.componentHitAreas[compIndex] = {
                        x: dragRect.x + padding,
                        y: currentY - 14,
                        width: dragRect.width - padding * 2,
                        height: 28,
                        component: comp
                    };
                    
                    currentY += timelineLineHeight;
                });
            }
            
            // 绘制起始时间和结束时间
            if (allAvtpkComponents.length > 0) {
                // duration 存储的是毫秒，需要转换为秒用于计算
                const maxDurationMs = Math.max(
                    ...allAvtpkComponents.map(c => {
                        const startTime = (c.startTime || 0);
                        const duration = c.duration > 0 ? c.duration : (c.duration === -1 ? 0 : 0);
                        return startTime + duration;
                    }),
                    0
                );
                
                // 检查是否有 Keyboard 组件且开启了 forceEndRoutine
                const hasKeyboardWithForceEnd = allAvtpkComponents.some(c => 
                    c.type === 'keyboard' && c.forceEndRoutine === true
                );
                
                // 检查是否所有组件都是无限 duration
                const allInfinite = allAvtpkComponents.every(c => c.duration === -1);
                
                const startTimeMs = 0;
                const endTimeMs = maxDurationMs;
                
                // 时间显示区域在组件下方
                const timeY = dragRect.y + dragRect.height - extraPadding + 8;
                
                ctx.font = '500 12px DM Sans, Roboto, sans-serif';
                ctx.fillStyle = '#8e8e93';
                ctx.textAlign = 'left';
                ctx.fillText(Math.round(startTimeMs) + ' ms', dragRect.x + padding, timeY);
                ctx.textAlign = 'right';

                if (allInfinite && hasKeyboardWithForceEnd) {
                    // 最大时间无限，但有 Keyboard 组件且开启了 forceEndRoutine，显示手指图标
                    if (tapIconLoaded) {
                        const iconSize = 16;
                        ctx.drawImage(tapIcon, dragRect.x + dragRect.width - padding - iconSize, timeY - iconSize/2 - 2, iconSize, iconSize);
                    } else {
                        // 图标未加载完成，显示无限符号作为后备
                        ctx.font = '500 14px DM Sans, Outfit, sans-serif';
                        ctx.fillText('∞', dragRect.x + dragRect.width - padding, timeY);
                    }
                } else if (allInfinite) {
                    // 所有组件都是无限 duration，显示无限符号
                    ctx.font = '500 14px DM Sans, Outfit, sans-serif';
                    ctx.fillText('∞', dragRect.x + dragRect.width - padding, timeY);
                } else if (hasKeyboardWithForceEnd) {
                    // 最大时间有限，但有 Keyboard 组件且开启了 forceEndRoutine，显示手指图标和最大时间
                    const iconSize = 16;
                    const timeText = Math.round(endTimeMs) + ' ms';
                    if (tapIconLoaded) {
                        // 计算时间文本宽度
                        const textWidth = ctx.measureText(timeText).width;
                        // 图标在左，时间文本在右
                        const totalWidth = iconSize + 4 + textWidth;
                        const startX = dragRect.x + dragRect.width - padding - totalWidth;
                        // 先显示图标
                        ctx.drawImage(tapIcon, startX, timeY - iconSize/2 - 2, iconSize, iconSize);
                        // 再显示时间文本（左对齐）
                        ctx.textAlign = 'left';
                        ctx.fillText(timeText, startX + iconSize + 4, timeY);
                        ctx.textAlign = 'right';
                    } else {
                        ctx.fillText(timeText, dragRect.x + dragRect.width - padding, timeY);
                    }
                } else {
                    // 正常显示结束时间
                    ctx.fillText(Math.round(endTimeMs) + ' ms', dragRect.x + dragRect.width - padding, timeY);
                }
                ctx.textAlign = 'left';
            }

            if (isSelected) {
                ctx.strokeStyle = '#1456f0';
                ctx.lineWidth = 2.5;
            } else {
                ctx.strokeStyle = '#222222';
                ctx.lineWidth = 1;
            }
            drawRoundedRect(dragRect.x, dragRect.y, dragRect.width, dragRect.height, dragRect.borderRadius);
            ctx.stroke();
        }

        function snapToPoint(rect) {
            const rectCenterX = rect.x + rect.width / 2;
            const rectTopY = rect.y;

            let nearestPoint = null;
            let minDistance = Infinity;

            snapPoints.forEach(point => {
                const distance = Math.sqrt(
                    Math.pow(rectCenterX - point.x, 2) +
                    Math.pow(rectTopY - point.y, 2)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestPoint = point;
                }
            });

            rect.x = nearestPoint.x - rect.width / 2;
            // 保持 y 位置顶部对齐，不重新居中
            rect.y = nearestPoint.y - 60;
            return true;
        }

        function findNearestSnapPoint(rect) {
            const rectCenterX = rect.x + rect.width / 2;
            const rectCenterY = rect.y + rect.height / 2;

            let nearestPoint = null;
            let minDistance = Infinity;

            snapPoints.forEach(point => {
                const distance = Math.sqrt(
                    Math.pow(rectCenterX - point.x, 2) +
                    Math.pow(rectCenterY - point.y, 2)
                );
                if (distance < minDistance) {
                    minDistance = distance;
                    nearestPoint = point;
                }
            });

            return nearestPoint;
        }

        function hasDragRectAtPoint(point) {
            for (const rect of routineRects) {
                if (!rect) continue;
                const rectCenterX = rect.x + rect.width / 2;
                // 只检查 x 坐标是否匹配，因为 routine 是通过 x 坐标对齐到 snapPoint 的
                // y 坐标可能不同（routine 中心与 snapPoint 不在同一水平线）
                if (Math.abs(rectCenterX - point.x) < 10) {
                    return true;
                }
            }
            return false;
        }

        function hasDragRectInLoopRange(startPoint, endPoint) {
            const startLabel = parseInt(startPoint.label);
            const endLabel = parseInt(endPoint.label);
            const minLabel = Math.min(startLabel, endLabel);
            const maxLabel = Math.max(startLabel, endLabel);

            // 检查每个 routine 是否在 loop 范围内
            // routine i 占据的连接点范围：[i * 2 + 1, i * 2 + 3]
            for (let i = 0; i < routineRects.length; i++) {
                const routineLeftLabel = i * 2 + 1;
                const routineRightLabel = i * 2 + 3;
                // 如果 routine 在 loop 范围内
                if (routineLeftLabel >= minLabel && routineRightLabel <= maxLabel) {
                    // 检查这个 routine 是否有 drag rect
                    const rect = routineRects[i];
                    if (rect && hasDragRectAtPoint({ x: rect.x + rect.width / 2, y: rect.y + rect.height / 2 })) {
                        return true;
                    }
                }
            }
            return false;
        }

        function findNearestValidPoint(pos) {
            let nearest = null;
            let minDist = lineSnapRadius;

            for (const point of linePoints) {
                // 新建连线时，排除起始点
                if (startPoint && point.label === startPoint.label) continue;
                
                // 端点拖拽时，排除当前连接的另一端点
                if (isDraggingConnectionEndpoint && draggedConnection) {
                    const otherPoint = draggedEndpoint === 'start' ? draggedConnection.end : draggedConnection.start;
                    if (point.label === otherPoint.label) continue;
                }
                
                const dist = Math.sqrt(
                    Math.pow(pos.x - point.x, 2) + Math.pow(pos.y - point.y, 2)
                );
                if (dist < minDist) {
                    minDist = dist;
                    nearest = point;
                }
            }
            return nearest;
        }

            const rect = canvas.getBoundingClientRect();
            const screenX = e.clientX - rect.left;
            const screenY = e.clientY - rect.top;
            return {

                y: (screenY / scale) - viewportY
            };
        }

        function isInsideRect(x, y, rect) {
            if (!rect) return false;
            return x >= rect.x && x <= rect.x + rect.width &&
                   y >= rect.y && y <= rect.y + rect.height;
        }

        function getDragRectAtPos(x, y) {
            for (const rect of routineRects) {
                if (rect && isInsideRect(x, y, rect)) return rect;
            }
            return null;
        }

        function isInsidePoint(pos, point) {
            const distance = Math.sqrt(

        canvas.addEventListener('mouseup', (e) => {

            if (activeDragRect && activeDragRect.isDragging) {
                activeDragRect.isDragging = false;
                
                const draggedIndex = routineRects.indexOf(activeDragRect);
                let targetIndex = -1;
                
                // 检查是否释放到另一个 routine 的位置上
                const dragRectCenter = {
                    x: activeDragRect.x + activeDragRect.width / 2,
                    y: activeDragRect.y + activeDragRect.height / 2
                };
                
                for (let i = 0; i < routineRects.length; i++) {
                    if (i === draggedIndex) continue;
                    
                    const otherRect = routineRects[i];
                    if (!otherRect) continue;
                    const otherCenter = {
                        x: otherRect.x + otherRect.width / 2,
                        y: otherRect.y + otherRect.height / 2
                    };
                    
                    // 计算两个 routine 中心的距离
                    const distance = Math.sqrt(
                        Math.pow(dragRectCenter.x - otherCenter.x, 2) +
                        Math.pow(dragRectCenter.y - otherCenter.y, 2)
                    );
                    
                    // 如果距离小于阈值（比如 routine 宽度的一半），认为是交换
                    if (distance < activeDragRect.width * 0.8) {
                        targetIndex = i;
                        break;

                }
                
                if (targetIndex !== -1) {
                    saveState();

                    // Animate the swap, then update array positions
                    animateSwap(draggedIndex, targetIndex, () => {
                        // 交换两个 routine 在数组中的位置
                        const temp = routineRects[draggedIndex];
                        routineRects[draggedIndex] = routineRects[targetIndex];
                        routineRects[targetIndex] = temp;
                        
                        // 更新选中的索引
                        if (selectedRoutineIndex === draggedIndex) {

                    draw();

                activeDragRect = null;

            // 处理端点拖拽放下
            if (isDraggingConnectionEndpoint && draggedConnection) {
                const targetPoint = nearestValidPoint || findNearestValidPoint(pos);
                if (targetPoint) {
                    // 检查新位置是否有效（必须有 routine 在范围内）
                    const newStartPoint = draggedEndpoint === 'start' ? targetPoint : draggedConnection.start;
                    const newEndPoint = draggedEndpoint === 'end' ? targetPoint : draggedConnection.end;
                    
                    if (hasDragRectInLoopRange(newStartPoint, newEndPoint)) {
                        saveState();
                        currentProjectFile = null;
                        fileHandle = null;
                        
                        // 更新连接的端点
                        draggedConnection.start = newStartPoint;
                        draggedConnection.end = newEndPoint;
                        
                        // 检查是否有重叠
                        if (isOverlapping(draggedConnection, connections)) {
                            // 如果重叠，恢复原状（这里简化处理，实际可能需要更复杂的逻辑）
                            // 由于已经 saveState，用户可以通过撤销恢复
                        } else {
                            rebuildAllConnectionDepths();
                        }
                    }
                }
                
                isDraggingConnectionEndpoint = false;
                draggedConnection = null;
                draggedEndpoint = null;
                nearestValidPoint = null;
                draw();
                return;
            }

            if (isDraggingLine && startPoint) {
                const targetPoint = nearestValidPoint || findNearestValidPoint(pos);
                if (targetPoint && hasDragRectInLoopRange(startPoint, targetPoint)) {
                    saveState();
                    currentProjectFile = null;
                    fileHandle = null;

                    const newStartLabel = parseInt(startPoint.label);
                    const newEndLabel = parseInt(targetPoint.label);
                    const newMin = Math.min(newStartLabel, newEndLabel);
                    const newMax = Math.max(newStartLabel, newEndLabel);

                        start: startPoint,

                        loopName: `trials_${++loopIdCounter}`,
                        loopReps: 1,
                        loopType: 'sequential',
                        loopConditions: '',
                        loopIsTrials: true
                    };
                    connections.push(newConn);

                        connections.pop();

        function isInsideConnection(pos, conn) {
            const tolerance = 20;
            const offsetY = getConnectionOffsetY(conn, connections);

            const seg1Start = { x: conn.start.x, y: conn.start.y };
            const seg1End = { x: conn.start.x, y: conn.start.y + offsetY };
            if (isNearSegment(pos, seg1Start, seg1End, tolerance)) return true;

            const seg2Start = { x: conn.start.x, y: conn.start.y + offsetY };
            const seg2End = { x: conn.end.x, y: conn.start.y + offsetY };
            if (isNearSegment(pos, seg2Start, seg2End, tolerance)) return true;

            const seg3Start = { x: conn.end.x, y: conn.start.y + offsetY };
            const seg3End = { x: conn.end.x, y: conn.end.y };
            if (isNearSegment(pos, seg3Start, seg3End, tolerance)) return true;

            return false;
        }

        function isNearSegment(pos, start, end, tolerance) {
            const dx = end.x - start.x;
            const dy = end.y - start.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            if (length === 0) return false;

            const t = Math.max(0, Math.min(1, ((pos.x - start.x) * dx + (pos.y - start.y) * dy) / (length * length)));
            const projX = start.x + t * dx;
            const projY = start.y + t * dy;
            const dist = Math.sqrt((pos.x - projX) * (pos.x - projX) + (pos.y - projY) * (pos.y - projY));
            return dist < tolerance;
        }

        function isInsideLoopBlock(pos, conn, allConns) {
            const offsetY = getConnectionOffsetY(conn, allConns);
            const cornerY = conn.start.y + offsetY;
            const middleX = (conn.start.x + conn.end.x) / 2;
            const followRectWidth = 60;
            const followRectHeight = 30;
            return pos.x >= middleX - followRectWidth / 2 &&
                   pos.x <= middleX + followRectWidth / 2 &&
                   pos.y >= cornerY - followRectHeight / 2 &&
                   pos.y <= cornerY + followRectHeight / 2;
        }

        // Loop Conditions functionality

        function detectVariablesFromRoutines() {
            const variables = new Set();
            
            // 从所有 routine 的 avtpComponents 中检测以 $ 开头的变量
            routineRects.forEach(rect => {
                if (!rect || !rect.avtpComponents) return;
                
                rect.avtpComponents.forEach(component => {
                    if (!component || typeof component !== 'object') return;
                    
                    Object.values(component).forEach(value => {
                        if (typeof value === 'string') {
                            // 匹配 $variableName 或 ${variableName} 格式
                            const matches = value.match(/\$\{?([a-zA-Z_][a-zA-Z0-9_]*)\}?/g);
                            if (matches) {
                                matches.forEach(match => {
                                    // 提取变量名（去掉 $ 和 {}）
                                    const varName = match.replace(/^\$\{?/, '').replace(/\}?$/, '');
                                    if (varName) variables.add(varName);
                                });
                            }
                        }
                    });
                });
            });
            
            return Array.from(variables).sort();
        }

        function getLoopConditions() {
            const jsonValue = formLoopConditions.value.trim();
            if (!jsonValue) return [];
            try {
                const parsed = JSON.parse(jsonValue);
                if (Array.isArray(parsed)) {
                    return parsed.filter(c => c._meta !== true).map((c, i) => ({
                        name: c.name || `Condition ${i + 1}`,
                        weight: c.weight !== undefined ? c.weight : 1,
                        values: c.values || {}
                    }));
                }
            } catch (e) {}
            return [];
        }

        function renderLoopConditions() {
            const conditions = getLoopConditions();
            const variables = detectVariablesFromRoutines();
            
            // 更新表头
            const headerRow = document.getElementById('loopConditionsHeaderRow');
            headerRow.innerHTML = `

            loopConditionsBody.innerHTML = '';

            if (conditions.length === 0) {
                loopConditionsEmpty.classList.remove('hidden');
                return;
            }

            loopConditionsEmpty.classList.add('hidden');

            conditions.forEach((condition, index) => {
                const row = document.createElement('tr');
                
                // Condition Name
                let rowHtml = `
                    <td>
                        <input type="text" class="loop-cond-name-input" data-index="${index}" value="${condition.name}" placeholder="Condition ${index + 1}">
                    </td>
                `;
                
                // Variable values
                variables.forEach(varName => {
                    const value = condition.values?.[varName] || '';
                    rowHtml += `

                        </td>

                });
                
                // Weight and Actions
                rowHtml += `
                    <td>
                        <input type="number" class="loop-cond-weight-input" data-index="${index}" value="${condition.weight}" min="1" step="1" placeholder="1">
                    </td>
                    <td>
                        <button type="button" class="loop-cond-remove-btn" data-index="${index}" title="Remove condition">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

            // Bind events

        function saveLoopConditions() {
            const conditions = [];
            const rows = loopConditionsBody.querySelectorAll('tr');
            const variables = detectVariablesFromRoutines();
            
            rows.forEach(row => {
                const nameInput = row.querySelector('.loop-cond-name-input');
                const weightInput = row.querySelector('.loop-cond-weight-input');
                
                if (nameInput && nameInput.value.trim()) {
                    const condition = {
                        name: nameInput.value.trim(),
                        weight: parseInt(weightInput?.value) || 1,
                        values: {}
                    };
                    
                    // 保存变量值
                    const varInputs = row.querySelectorAll('.loop-cond-var-input');
                    varInputs.forEach(input => {
                        const varName = input.dataset.var;
                        if (varName) {
                            condition.values[varName] = input.value || '';

                    });
                    
                    conditions.push(condition);
                }
            });

            formLoopConditions.value = conditions.length > 0 ? JSON.stringify(conditions) : '';

        function addLoopCondition() {
            const conditions = getLoopConditions();
            const newIndex = conditions.length + 1;

        function removeLoopCondition(index) {
            const conditions = getLoopConditions();

        canvas.addEventListener('click', (e) => {
            // 如果是双击触发的，忽略 click 事件
            if (shouldIgnoreClick) {

                return;
            }
            
            const pos = getMousePos(e);

            // 首先检查是否点击了 loop 连线（不包括中间的 block）
            for (let i = connections.length - 1; i >= 0; i--) {
                if (isInsideConnection(pos, connections[i])) {
                    activeConnection = connections[i];

                    if (selectedRoutineIndex !== -1) {
                        selectedRoutineIndex = -1;

                    draw();

            // 如果没有点击连线，清除选中状态
            if (activeConnection) {
                activeConnection = null;
                draw();
            }

            for (let i = connections.length - 1; i >= 0; i--) {
                if (isInsideLoopBlock(pos, connections[i], connections)) {
                    showLoopForm(connections[i]);
                    return;

            }

            const clickedRect = getDragRectAtPos(pos.x, pos.y);
            if (clickedRect) {
                // 检查是否点击到了某个 AVTPK 组件
                let clickedComponent = null;
                if (clickedRect.componentHitAreas && clickedRect.componentHitAreas.length > 0) {
                    for (const hitArea of clickedRect.componentHitAreas) {
                        if (hitArea && pos.x >= hitArea.x && pos.x <= hitArea.x + hitArea.width &&
                            pos.y >= hitArea.y && pos.y <= hitArea.y + hitArea.height) {
                            clickedComponent = hitArea.component;
                            break;
                        }
                    }
                }
                
                // 如果点击了组件，跳过 routine 表单动画，直接显示组件表单
                if (clickedComponent) {

                    avtpForm.style.transition = '';
                    // 然后立即打开组件表单
                    showAvtpkForm(clickedComponent.type);
                } else {
                    // 正常打开 routine 表单（带动画）
                    showRoutineForm(clickedRect);
                }
                return;
            }
        });

        const addRoutineBtn = document.getElementById('addRoutine');
        const removeRoutineBtn = document.getElementById('removeRoutine');

        function updateRoutineCount() {
            addRoutineBtn.disabled = false;
            removeRoutineBtn.disabled = routineRects.length <= 0 || selectedRoutineIndex < 0;
        }

        function updatePoints() {
            currentRoutineCount = routineRects.length;
            canvasWidth = calculateCanvasWidth(currentRoutineCount);
            
            if (routineRects.length > 0) {
                const validRightXValues = routineRects
                    .map((rect, index) => {
                        if (!rect || rect.width === undefined || rect.height === undefined) return null;
                        const snapPoint = snapPoints[index];
                        if (!snapPoint) return null;
                        return snapPoint.x + rect.width / 2;
                    })
                    .filter(val => val !== null && !isNaN(val));
                
                if (validRightXValues.length > 0) {
                    const maxRoutineRight = Math.max(...validRightXValues);
                    const requiredWidth = maxRoutineRight + 100;
                    canvasWidth = Math.max(canvasWidth, requiredWidth);
                }
            }
            
            canvas.width = window.innerWidth * dpr;
            canvas.height = window.innerHeight * dpr;
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            ctx.scale(dpr, dpr);

            const connectionLabels = originalConnectionLabels !== null ?
                originalConnectionLabels.map((labels, i) => ({
                    startLabel: labels.startLabel,
                    endLabel: labels.endLabel,
                    depth: connections[i] ? connections[i].depth : 0,
                    loopName: connections[i] ? connections[i].loopName : '',
                    loopReps: connections[i] ? connections[i].loopReps : 1,
                    loopType: connections[i] ? connections[i].loopType : '',
                    loopConditions: connections[i] ? connections[i].loopConditions : [],
                    loopIsTrials: connections[i] ? connections[i].loopIsTrials : false
                })) :
                connections.map(conn => ({
                    startLabel: conn.start.label,
                    endLabel: conn.end.label,
                    depth: conn.depth,
                    loopName: conn.loopName,
                    loopReps: conn.loopReps,
                    loopType: conn.loopType,
                    loopConditions: conn.loopConditions,
                    loopIsTrials: conn.loopIsTrials
                }));

            const displayCount = Math.max(routineRects.length, minDisplayRoutines);
            pointsData = generatePoints(displayCount);
            snapPoints = pointsData.snap;
            linePoints = pointsData.line;
            flowStartX = pointsData.startX;
            flowEndX = pointsData.endX;
            reassignSnapPoints();

            // 从后向前遍历，以便删除loop时不会影响索引
            for (let i = connections.length - 1; i >= 0; i--) {
                const labels = connectionLabels[i];
                const newStartPoint = linePoints.find(p => p.label === labels.startLabel);
                const newEndPoint = linePoints.find(p => p.label === labels.endLabel);
                
                // 检查loop的起点和终点是否都对应实际存在的routine
                // loop使用连接点label（奇数）：label 2i+1 是 routine i 的左侧，也是 routine i-1 的右侧（i>0时）
                function isLabelValid(label) {
                    const i = (parseInt(label) - 1) / 2;
                    // label 2i+1 对应左侧 routine i 和右侧 routine i-1
                    const leftRoutineValid = i >= 0 && i < routineRects.length;
                    const rightRoutineValid = i > 0 && (i - 1) >= 0 && (i - 1) < routineRects.length;
                    return leftRoutineValid || rightRoutineValid;
                }
                const isStartValid = isLabelValid(labels.startLabel);
                const isEndValid = isLabelValid(labels.endLabel);
                
                if (newStartPoint && newEndPoint && isStartValid && isEndValid) {
                    connections[i].start = newStartPoint;
                    connections[i].end = newEndPoint;
                } else {
                    // 如果loop的起点或终点找不到对应的点，或者对应的routine不存在，删除该loop
                    const removedConn = connections[i];
                    connections.splice(i, 1);
                    // 如果删除的是当前选中的loop，清除选中状态
                    if (activeConnection === removedConn) {
                        activeConnection = null;
                    }
                }
            }
        }

        function reassignSnapPoints() {
            routineRects.forEach((rect, index) => {
                // 跳过 null 占位符
                if (!rect) return;
                // 只更新已有完整属性的 routine
                if (rect.width && rect.height) {
                    const snapPoint = snapPoints[index];
                    rect.x = snapPoint.x - rect.width / 2;
                    // 所有 routine 保持同一个顶部高度（基于 snap point 顶部对齐）
                    rect.y = snapPoint.y - 60;
                }
            });
        }

        // Animate routines swapping positions
        function animateSwap(draggedIndex, targetIndex, onComplete) {
            const duration = 300; // ms
            const startTime = performance.now();

            // Get target positions from snap points
            const draggedTargetSnap = snapPoints[targetIndex];
            const targetTargetSnap = snapPoints[draggedIndex];

            // Store start positions
            const draggedRect = routineRects[draggedIndex];
            const targetRect = routineRects[targetIndex];

            const draggedStartX = draggedRect.x;
            const draggedStartY = draggedRect.y;
            const targetStartX = targetRect.x;
            const targetStartY = targetRect.y;

            const draggedTargetX = draggedTargetSnap.x - draggedRect.width / 2;
            const draggedTargetY = draggedTargetSnap.y - 60;
            const targetTargetX = targetTargetSnap.x - targetRect.width / 2;
            const targetTargetY = targetTargetSnap.y - 60;

            swapAnimation = {
                draggedIndex,
                targetIndex,
                draggedStartX,
                draggedStartY,
                targetStartX,
                targetStartY,
                draggedTargetX,
                draggedTargetY,
                targetTargetX,
                targetTargetY
            };

            function easeOutCubic(t) {
                return 1 - Math.pow(1 - t, 3);
            }

            function frame(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = easeOutCubic(progress);

                // Update positions with easing
                draggedRect.x = draggedStartX + (draggedTargetX - draggedStartX) * eased;
                draggedRect.y = draggedStartY + (draggedTargetY - draggedStartY) * eased;
                targetRect.x = targetStartX + (targetTargetX - targetStartX) * eased;
                targetRect.y = targetStartY + (targetTargetY - targetStartY) * eased;

                draw();

                if (progress < 1) {
                    requestAnimationFrame(frame);
                } else {
                    swapAnimation = null;
                    onComplete();
                }
            }

            requestAnimationFrame(frame);
        }

        // 辅助函数：将 connections 转换为 loops 数组
        function connectionsToLoops(conns) {
            return conns.map((conn, index) => {
                const startPoint = parseInt(conn.start.label);
                const endPoint = parseInt(conn.end.label);
                
                return {
                    id: index,
                    name: conn.loopName || `loop_${index}`,
                    startPoint: startPoint,
                    endPoint: endPoint,
                    reps: conn.loopReps || 1,
                    type: conn.loopType || 'sequential',
                    conditions: conn.loopConditions || '',
                    conditionsFile: conn.loopConditionsFile || '',
                    isTrials: conn.loopIsTrials !== false
                };
            });
        }

        // 辅助函数：将 loops 数组转换为 connections（用于内部渲染）
        function loopsToConnections(loops) {
            return loops.map((loop, index) => {
                const startPoint = loop.startPoint;
                const endPoint = loop.endPoint;
                
                return {
                    start: { label: String(startPoint), position: 'right' },
                    end: { label: String(endPoint), position: 'left' },
                    depth: 0,
                    loopName: loop.name || `loop_${index}`,
                    loopReps: loop.reps || 1,
                    loopType: loop.type || 'sequential',
                    loopConditions: loop.conditions || '',
                    loopConditionsFile: loop.conditionsFile || '',
                    loopIsTrials: loop.isTrials !== false
                };
            });
        }

        // 辅助函数：解析导入的项目数据，支持新旧两种格式
        function parseProjectData(projectData) {
            const routines = [];
            const loops = [];
            
            // 检查版本：新格式（version 2.0+）或旧格式
            if (projectData.version && projectData.version.startsWith('2.')) {
                // 新格式：routines + loops
                if (projectData.routines && Array.isArray(projectData.routines)) {
                    projectData.routines.forEach(r => {
                        routines.push({
                            id: r.id,
                            name: r.name,
                            x: r.x,
                            y: r.y,
                            width: r.width || 200,
                            height: r.height,
                            duration: r.duration,
                            avtpComponents: r.avtpComponents || [],
                            borderRadius: 10,
                            isDragging: false,
                            offsetX: 0,
                            offsetY: 0,
                            keys: r.keys || 'Space, F, J'
                        });
                    });
                }
                if (projectData.loops && Array.isArray(projectData.loops)) {
                    projectData.loops.forEach(l => {
                        loops.push({
                            id: l.id,
                            name: l.name,
                            startPoint: l.startPoint,
                            endPoint: l.endPoint,
                            reps: l.reps || 1,
                            type: l.type || 'sequential',
                            conditions: l.conditions || '',
                            conditionsFile: l.conditionsFile || '',
                            isTrials: l.isTrials !== false
                        });
                    });
                }
            } else {
                // 旧格式：routineRects + connections
                if (projectData.routineRects && Array.isArray(projectData.routineRects)) {
                    routines.push(...projectData.routineRects);
                }
                if (projectData.connections && Array.isArray(projectData.connections)) {
                    // 转换旧格式的 connections 为新格式的 loops
                    projectData.connections.forEach((conn, index) => {
                        if (typeof conn.from === 'number' && typeof conn.to === 'number') {
                            // 旧简单格式：from/to 是点编号
                            // from 是奇数点（loop 起点），to 是奇数点（loop 终点）
                            loops.push({
                                id: index,
                                name: conn.loopName || `loop_${index}`,
                                startPoint: conn.from,
                                endPoint: conn.to,
                                reps: conn.loopReps || 1,
                                type: conn.loopType || 'sequential',
                                conditions: conn.loopConditions || '',
                                conditionsFile: conn.loopConditionsFile || '',
                                isTrials: conn.loopIsTrials !== false
                            });
                        } else if (conn.start && conn.end) {
                            // 旧详细格式：有 start/end 点
                            const startPoint = parseInt(conn.start.label);
                            const endPoint = parseInt(conn.end.label);
                            loops.push({
                                id: index,
                                name: conn.loopName || `loop_${index}`,
                                startPoint: startPoint,
                                endPoint: endPoint,
                                reps: conn.loopReps || 1,
                                type: conn.loopType || 'sequential',
                                conditions: conn.loopConditions || '',
                                conditionsFile: conn.loopConditionsFile || '',
                                isTrials: conn.loopIsTrials !== false
                            });
                        }
                    });
                }
            }

            return { routines, loops };
        }

                    // 移除最后一个 } 或 ] 之前的所有逗号

                    // 修复未加引号的属性名（例如：{name: "value"} -> {"name": "value"}）
                    // 匹配对象字面量中的未加引号属性名
                    fixedContent = fixedContent.replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g, '$1"$2":');
                    
                    // 修复单引号包裹的字符串（改为双引号）

                    timestamp: new Date().toISOString()
                }, '*');

                // 显示通知
                showNotification('✅ Flowchart loaded: ' + fileName);

            if (e.key === 'Delete' || e.key === 'Backspace') {
                if (activeConnection) {
                    e.preventDefault();
                    const index = connections.indexOf(activeConnection);
                    if (index !== -1) {
                        saveState();
                        currentProjectFile = null;
